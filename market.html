<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سادن | إدارة التسويق وملفات الإنجاز</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #3b82f6; --dark: #0f172a; --bg: #f8fafc; 
            --border: #e2e8f0; --accent: #020470; --success: #10b981; --danger: #ef4444;
        }

        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .header { 
            background: var(--dark); padding: 15px 30px; 
            display: flex; justify-content: space-between; 
            align-items: center; color: white; position: sticky; top: 0; z-index: 1000;
        }
        
        .container { padding: 30px; max-width: 1400px; margin: auto; }

        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 20px; }
        
        .stats-bar { 
            background: white; padding: 12px 25px; border-radius: 12px; 
            border: 1px solid var(--border); display: flex; gap: 30px; flex-grow: 1;
        }
        .stat-item b { color: var(--accent); font-size: 18px; }

        .search-wrapper { width: 220px; }
        .search-input { 
            width: 100%; padding: 10px 15px; border-radius: 10px; 
            border: 1px solid var(--border); outline: none; font-family: 'Tajawal'; font-size: 13px;
        }

        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .staff-card { 
            background: white; border-radius: 15px; border: 1px solid var(--border); 
            padding: 20px; position: relative; transition: 0.3s; 
        }
        .staff-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.08); }
        
        .badge { position: absolute; left: 15px; top: 15px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .type-field { background: #dcfce7; color: #166534; }
        .type-office { background: #e0f2fe; color: #0369a1; }

        .job-id-tag { color: var(--primary); font-weight: bold; font-size: 11px; margin-bottom: 5px; display: block; }
        .staff-name { font-size: 19px; font-weight: bold; color: var(--accent); margin-bottom: 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        
        .btn-achieve-link {
            background: #f1f5f9; color: var(--accent); border: 1px solid var(--border);
            width: 100%; padding: 10px; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-family: 'Tajawal'; margin-top: 10px; transition: 0.3s;
        }
        .btn-achieve-link:hover { background: var(--accent); color: white; }

        .card-actions { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
        .btn-text { background: none; border: none; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; font-size: 13px; }

        /* المودالات */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 2000; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 750px; margin: 2% auto; border-radius: 20px; overflow: hidden; animation: slideIn 0.3s; }
        
        /* واجهة ملف الإنجاز */
        .ach-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; padding: 40px; overflow-y: auto; }
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
        .plan-box { border: 1px solid var(--border); padding: 20px; border-radius: 12px; background: #fff; }
        .task-item { display: flex; justify-content: space-between; background: #f8fafc; padding: 8px; border-radius: 6px; margin-bottom: 5px; font-size: 13px; }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">👥 سادن | نظام التسويق والإنجاز</h2>
        <button onclick="openAddModal()" style="background:var(--success); color:white; border:none; padding:12px 24px; border-radius:10px; cursor:pointer; font-weight:bold;">➕ إضافة موظف جديد</button>
    </div>

    <div class="container">
        <div class="top-row">
            <div class="stats-bar">
                <div class="stat-item"><span>الإجمالي:</span> <b id="totalCount">0</b></div>
                <div class="stat-item"><span>ميداني:</span> <b id="fieldCount" style="color:var(--success)">0</b></div>
            </div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" onkeyup="filterStaff()" placeholder="بحث بالاسم أو الرقم...">
            </div>
        </div>
        <div class="staff-grid" id="staffContainer"></div>
    </div>

    <div id="staffModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="background:var(--accent); color:white; padding:20px; display:flex; justify-content:space-between;">
                <h3 id="modalTitle" style="margin:0">بيانات الموظف</h3>
                <span onclick="closeModal()" style="cursor:pointer">✕</span>
            </div>
            <div style="padding:25px; display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <input type="text" id="job_id" placeholder="الرقم الوظيفي">
                <input type="text" id="name" placeholder="الاسم الكامل">
                <input type="text" id="id_num" placeholder="رقم الهوية">
                <input type="date" id="h_date">
                <select id="region">
                    <option>خميس مشيط</option><option>الرياض</option><option>جدة</option><option>أمانة عسير</option>
                </select>
                <select id="type">
                    <option value="field">ميداني</option><option value="office">مكتبي</option>
                </select>
                <input type="text" id="mobile" placeholder="رقم الجوال">
                <input type="email" id="email" placeholder="البريد الإلكتروني">
                <textarea id="skills" style="grid-column: span 2;" placeholder="المهارات..."></textarea>
            </div>
            <button onclick="saveData()" style="background:var(--accent); color:white; border:none; padding:15px; width:100%; cursor:pointer; font-weight:bold;">حفظ البيانات</button>
        </div>
    </div>

    <div id="achView" class="ach-view">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--bg); padding-bottom:15px;">
            <div>
                <h1 id="achName" style="margin:0; color:var(--accent)"></h1>
                <p id="achID" style="color:var(--primary); margin:5px 0; font-weight:bold;"></p>
            </div>
            <button onclick="closeAch()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">إغلاق الملف ✕</button>
        </div>

        <div class="ach-grid">
            <div class="plan-box">
                <h4>📅 خطة يومية</h4>
                <div id="dailyList"></div>
                <div style="margin-top:10px; display:flex; gap:5px;">
                    <input type="text" id="dayIn" style="flex:1; padding:5px;" placeholder="أضف مهمة...">
                    <button onclick="addTask('daily')" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:4px;">+</button>
                </div>
            </div>
            <div class="plan-box">
                <h4>🗓️ خطة أسبوعية</h4>
                <div id="weekList"></div>
                <div style="margin-top:10px; display:flex; gap:5px;">
                    <input type="text" id="weekIn" style="flex:1; padding:5px;" placeholder="أضف مهمة...">
                    <button onclick="addTask('weekly')" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:4px;">+</button>
                </div>
            </div>
            <div class="plan-box">
                <h4>📊 خطة شهرية</h4>
                <div id="monthList"></div>
                <div style="margin-top:10px; display:flex; gap:5px;">
                    <input type="text" id="monthIn" style="flex:1; padding:5px;" placeholder="أضف هدف...">
                    <button onclick="addTask('monthly')" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:4px;">+</button>
                </div>
            </div>
        </div>
    </div>

<script>
    let staffData = JSON.parse(localStorage.getItem('saden_final_system')) || [];
    let activeIdx = -1;

    function renderCards(data = staffData) {
        const container = document.getElementById('staffContainer');
        container.innerHTML = "";
        data.forEach((s, index) => {
            const realIdx = staffData.findIndex(item => item.job_id === s.job_id);
            container.innerHTML += `
                <div class="staff-card">
                    <span class="badge ${s.type === 'field' ? 'type-field' : 'type-office'}">${s.type === 'field' ? 'ميداني' : 'مكتبي'}</span>
                    <span class="job-id-tag">رقم وظيفي: ${s.job_id}</span>
                    <div class="staff-name">${s.name}</div>
                    <div style="font-size:12px; color:#64748b;">📍 ${s.region} | 📞 ${s.mobile}</div>
                    
                    <button class="btn-achieve-link" onclick="openAch(${realIdx})">📁 ملف الإنجاز والمتابعة</button>
                    
                    <div class="card-actions">
                        <button class="btn-text" style="color:var(--primary)" onclick="openEditModal(${realIdx})">📝 تعديل</button>
                        <button class="btn-text" style="color:var(--danger)" onclick="deleteStaff(${realIdx})">✕ حذف</button>
                    </div>
                </div>
            `;
        });
        updateStats();
    }

    function openAch(index) {
        activeIdx = index;
        const s = staffData[index];
        if(!s.plans) s.plans = { daily: [], weekly: [], monthly: [] };
        
        document.getElementById('achName').innerText = s.name;
        document.getElementById('achID').innerText = "الرقم الوظيفي: " + s.job_id;
        renderTasks();
        document.getElementById('achView').style.display = 'block';
    }

    function renderTasks() {
        const p = staffData[activeIdx].plans;
        const map = { daily: 'dailyList', weekly: 'weekList', monthly: 'monthList' };
        for (let type in map) {
            const div = document.getElementById(map[type]);
            div.innerHTML = "";
            p[type].forEach((t, i) => {
                div.innerHTML += `
                    <div class="task-item">
                        <span style="${t.done ? 'text-decoration:line-through; color:gray' : ''}">${t.text}</span>
                        <div>
                            <span onclick="toggleTask('${type}', ${i})" style="cursor:pointer">${t.done ? '✅' : '⬜'}</span>
                            <span onclick="delTask('${type}', ${i})" style="cursor:pointer; color:red; margin-right:8px;">✕</span>
                        </div>
                    </div>
                `;
            });
        }
    }

    function addTask(type) {
        const val = document.getElementById(type === 'daily' ? 'dayIn' : type === 'weekly' ? 'weekIn' : 'monthIn').value;
        if(!val) return;
        staffData[activeIdx].plans[type].push({ text: val, done: false });
        saveAndSync();
        document.getElementById(type === 'daily' ? 'dayIn' : type === 'weekly' ? 'weekIn' : 'monthIn').value = "";
    }

    function toggleTask(type, i) { staffData[activeIdx].plans[type][i].done = !staffData[activeIdx].plans[type][i].done; saveAndSync(); }
    function delTask(type, i) { staffData[activeIdx].plans[type].splice(i, 1); saveAndSync(); }
    function saveAndSync() { localStorage.setItem('saden_final_system', JSON.stringify(staffData)); renderTasks(); }
    function closeAch() { document.getElementById('achView').style.display = 'none'; }

    // وظائف الموظفين الأساسية
    function openAddModal() { activeIdx = -1; clearFields(); document.getElementById('staffModal').style.display = 'block'; }
    function openEditModal(i) {
        activeIdx = i; const s = staffData[i];
        document.getElementById('job_id').value = s.job_id;
        document.getElementById('name').value = s.name;
        document.getElementById('id_num').value = s.id_num;
        document.getElementById('region').value = s.region;
        document.getElementById('type').value = s.type;
        document.getElementById('mobile').value = s.mobile;
        document.getElementById('email').value = s.email;
        document.getElementById('skills').value = s.skills;
        document.getElementById('staffModal').style.display = 'block';
    }

    function saveData() {
        const obj = {
            job_id: document.getElementById('job_id').value,
            name: document.getElementById('name').value,
            id_num: document.getElementById('id_num').value,
            region: document.getElementById('region').value,
            type: document.getElementById('type').value,
            mobile: document.getElementById('mobile').value,
            email: document.getElementById('email').value,
            skills: document.getElementById('skills').value,
            plans: activeIdx === -1 ? { daily: [], weekly: [], monthly: [] } : staffData[activeIdx].plans
        };
        if(!obj.job_id || !obj.name) return alert("الاسم والرقم الوظيفي مطلوبان");
        if(activeIdx === -1) staffData.push(obj); else staffData[activeIdx] = obj;
        localStorage.setItem('saden_final_system', JSON.stringify(staffData));
        renderCards(); closeModal();
    }

    function closeModal() { document.getElementById('staffModal').style.display = 'none'; }
    function filterStaff() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = staffData.filter(s => s.name.toLowerCase().includes(term) || s.job_id.includes(term));
        renderCards(filtered);
    }
    function updateStats() {
        document.getElementById('totalCount').innerText = staffData.length;
        document.getElementById('fieldCount').innerText = staffData.filter(s => s.type === 'field').length;
    }
    function deleteStaff(i) { if(confirm("حذف الموظف؟")) { staffData.splice(i, 1); localStorage.setItem('saden_final_system', JSON.stringify(staffData)); renderCards(); } }
    function clearFields() { document.querySelectorAll('#staffModal input, #staffModal textarea').forEach(i => i.value = ""); }

    renderCards();
</script>
</body>
</html>
