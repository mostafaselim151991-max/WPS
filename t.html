<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام سادن | اختيار الفرع والمسير</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --navy: #1e293b; --green: #166534; --blue: #3b82f6; }
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; width: 99%; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-box { text-align: center; border-bottom: 3px solid var(--navy); margin-bottom: 15px; }
        
        .top-panel { position: sticky; top: 0; z-index: 1000; background: #f1f5f9; padding-bottom: 15px; }
        .summary-section { background: #1e293b; color: white; border-radius: 8px; display: flex; justify-content: space-around; padding: 15px; }
        
        /* تصميم القائمة المنسدلة */
        .branch-selector { 
            padding: 10px; 
            font-family: 'Tajawal'; 
            font-weight: bold; 
            border: 2px solid var(--blue); 
            border-radius: 8px; 
            width: 300px; 
            cursor: pointer;
            background: white;
        }

        .kofala-block { margin-top: 20px; border: 2px solid #cbd5e1; border-radius: 8px; overflow: hidden; background: white; margin-bottom: 30px; }
        .kofala-header { background: #334155; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .payroll-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .payroll-table th { background: var(--navy); color: white; border: 1px solid #475569; padding: 8px 2px; }
        .payroll-table td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        
        .input-cell { width: 45px; border: 1px solid #ddd; padding: 5px; text-align: center; font-size: 10px; border-radius: 4px; }
        .net-highlight { background: #dcfce7 !important; color: #166534 !important; font-weight: bold; }
        .gosi-cell { background: #fff7ed; font-weight: bold; color: #9a3412; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box"><h2>شركة سادن المتخصصة للاستشارات الجيولوجية</h2></div>

    <div class="top-panel">
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 15px;">
            <label style="font-weight: bold; color: var(--navy);">اختر الفرع لعرض المسير:</label>
            <select id="branchSelect" class="branch-selector" onchange="loadSelectedBranch()">
                <option value="">-- اختر الفرع من هنا --</option>
            </select>
            <button class="btn" style="background:var(--green); color:white" onclick="exportToExcel()">📊 تصدير Excel</button>
        </div>

        <div class="summary-section">
            <div style="text-align:center">
                <h3 style="font-size:13px; color:#cbd5e1">صافي رواتب الفرع</h3>
                <p id="grandTotalNet" style="color:#4ade80; font-size: 22px; font-weight: bold; margin: 5px 0;">0.00</p>
            </div>
            <div style="text-align:center">
                <h3 style="font-size:13px; color:#cbd5e1">تأمينات الشركة</h3>
                <p id="grandTotalGosi" style="color:#facc15; font-size: 22px; font-weight: bold; margin: 5px 0;">0.00</p>
            </div>
        </div>
    </div>

    <div id="mainContainer"></div>
</div>

<script>
    let payrollData = [];

    // دالة لتعبئة القائمة المنسدلة بالفروع الموجودة فعلياً في الذاكرة
    function populateBranchDropdown() {
        const select = document.getElementById('branchSelect');
        const storedData = JSON.parse(localStorage.getItem('saden_kofalat_db')) || {};
        
        // إفراغ القائمة ما عدا الخيار الأول
        select.innerHTML = '<option value="">-- اختر الفرع من هنا --</option>';
        
        Object.keys(storedData).forEach(branch => {
            const option = document.createElement('option');
            option.value = branch;
            option.textContent = branch;
            select.appendChild(option);
        });
    }

    // دالة استدعاء بيانات الفرع المختار
    function loadSelectedBranch() {
        const selectedBranch = document.getElementById('branchSelect').value;
        const storedData = JSON.parse(localStorage.getItem('saden_kofalat_db')) || {};

        if (selectedBranch && storedData[selectedBranch]) {
            payrollData = storedData[selectedBranch];
            render();
        } else {
            payrollData = [];
            render();
        }
    }

    function render() {
        const container = document.getElementById('mainContainer');
        container.innerHTML = "";
        let gNet = 0, gGosi = 0;

        if (payrollData.length === 0) {
            container.innerHTML = "<div style='text-align:center; padding:50px; color:#64748b;'>يرجى اختيار فرع من القائمة أعلاه لعرض البيانات</div>";
            document.getElementById('grandTotalNet').innerText = "0.00";
            document.getElementById('grandTotalGosi').innerText = "0.00";
            return;
        }

        payrollData.forEach(kofala => {
            let kNet = 0;
            const block = document.createElement('div');
            block.className = 'kofala-block';

            let tableHTML = `
                <div class="kofala-header"><span>كفالة: ${kofala.title}</span></div>
                <table class="payroll-table">
                    <thead>
                        <tr>
                            <th rowspan="2">م</th><th rowspan="2">الحالة</th><th rowspan="2">الاسم</th>
                            <th rowspan="2">الجنسية</th><th rowspan="2">الأساسي</th><th rowspan="2">سكن</th>
                            <th colspan="5">بدلات</th><th rowspan="2">خصم تأمين</th><th rowspan="2">الصافي</th>
                            <th rowspan="2">تأمينات(ش)</th><th rowspan="2">الآيبان</th>
                        </tr>
                        <tr style="background:#475569">
                            <td>سيارة</td><td>جوال</td><td>موقع</td><td>إقامة</td><td>أخرى</td>
                        </tr>
                    </thead>
                    <tbody>`;

            kofala.employees.forEach((emp, i) => {
                let isVac = emp.status === "أجازة";
                let isClear = emp.status === "تصفية";
                let gRate = (emp.nat === "سعودي") ? 0.215 : 0.02;
                let gosiCom = Math.round(((emp.basic || 0) + (emp.saken || 0)) * gRate);
                
                let net = 0;
                if (isClear) net = emp.clearance || 0;
                else if (isVac) net = 0;
                else {
                    let totalEarn = (emp.basic || 0) + (emp.saken || 0) + (emp.car || 0) + (emp.mobile || 0) + (emp.site || 0) + (emp.residence || 0) + (emp.otherFix || 0);
                    net = totalEarn - (emp.gosiDeduct || 0);
                }

                kNet += net; gNet += net; gGosi += gosiCom;

                tableHTML += `
                    <tr>
                        <td>${i+1}</td>
                        <td style="font-weight:bold; color:${isVac?'red':'inherit'}">${emp.status}</td>
                        <td>${emp.name}</td>
                        <td>${emp.nat}</td>
                        <td>${emp.basic}</td>
                        <td>${emp.saken}</td>
                        <td>${emp.car}</td>
                        <td>${emp.mobile}</td>
                        <td>${emp.site}</td>
                        <td>${emp.residence}</td>
                        <td>${emp.otherFix}</td>
                        <td>${emp.gosiDeduct}</td>
                        <td class="net-highlight">${net.toLocaleString()}</td>
                        <td class="gosi-cell">${gosiCom}</td>
                        <td style="font-size:9px">${emp.bank || ''}</td>
                    </tr>`;
            });

            tableHTML += `</tbody></table><div style="padding:8px; background:#f0fdf4; font-weight:bold; text-align:left;">صافي الكفالة: ${kNet.toLocaleString()}</div>`;
            block.innerHTML = tableHTML;
            container.appendChild(block);
        });

        document.getElementById('grandTotalNet').innerText = gNet.toLocaleString();
        document.getElementById('grandTotalGosi').innerText = gGosi.toLocaleString();
    }

    function exportToExcel() {
        const branch = document.getElementById('branchSelect').value || "سادن";
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.table_to_sheet(document.getElementById('mainContainer'));
        XLSX.utils.book_append_sheet(wb, ws, "المسير");
        XLSX.writeFile(wb, `مسير_رواتب_${branch}.xlsx`);
    }

    // تشغيل الدالة فور فتح الصفحة لتعبئة القائمة
    window.onload = populateBranchDropdown;
</script>
</body>
</html>
