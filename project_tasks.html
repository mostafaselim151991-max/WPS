<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة مهام المشروعات | سادن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0284c7; --navy: #1e293b; --bg: #f8fafc;
            --text: #334155; --border: #e2e8f0; --white: #ffffff;
            --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
            --purple: #8b5cf6; --pink: #ec4899;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 24px; min-height: 100vh; }

        .container { max-width: 1400px; margin: auto; }

        header { text-align: center; margin-bottom: 24px; border-bottom: 3px solid var(--primary); padding-bottom: 12px; }
        header h1 { margin: 0; font-size: 22px; color: var(--navy); }
        header p { margin: 5px 0 0; color: #64748b; font-size: 13px; }

        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-end; }
        .toolbar .field { flex: 1; min-width: 180px; display: flex; flex-direction: column; }
        .toolbar .field label { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #64748b; }
        .toolbar .field input, .toolbar .field select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Tajawal'; font-size: 13px; }
        .btn { padding: 10px 22px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-family: 'Tajawal'; font-size: 13px; transition: .2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #0369a1; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 14px; padding: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06); border-top: 4px solid var(--primary); }
        .stat-card .val { font-size: 28px; font-weight: 900; color: var(--navy); }
        .stat-card .lbl { font-size: 12px; color: #64748b; margin-top: 4px; }

        .card { background: white; border-radius: 14px; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 20px; }
        .card-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 16px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #64748b; }
        .field input, .field select, .field textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: 'Tajawal'; font-size: 13px; }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(2,132,199,.1); }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: var(--navy); color: white; padding: 12px 14px; font-size: 12px; text-align: right; }
        .data-table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
        .data-table tr:hover td { background: #f8fafc; }
        .data-table tr:last-child td { border-bottom: none; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-progress { background: #dbeafe; color: #1d4ed8; }
        .badge-done { background: #d1fae5; color: #065f46; }
        .badge-high { background: #fee2e2; color: #991b1b; }
        .badge-medium { background: #fef9c3; color: #92400e; }
        .badge-low { background: #dbeafe; color: #1d4ed8; }

        .actions { display: flex; gap: 6px; }
        .actions button { padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-family: 'Tajawal'; }

        .empty-msg { text-align: center; padding: 40px; color: #94a3b8; font-size: 14px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9999; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; width: 700px; max-height: 90vh; overflow-y: auto; padding: 24px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; color: var(--navy); }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #64748b; }

        @media(max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .toolbar { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📋 إدارة مهام المشروعات</h1>
        <p>تتبع وتوزيع المهام على الموظفين حسب المشروع</p>
    </header>

    <div class="stats-row" style="display: flex; gap: 16px; margin-bottom: 24px; overflow-x: auto; padding: 10px 0;">
        <div class="stat-card" style="border-top-color: var(--primary); min-width: 140px; flex-shrink: 0;">
            <div class="val" id="stat-total">0</div>
            <div class="lbl">إجمالي المهام</div>
        </div>
        <div class="stat-card" style="border-top-color: var(--warning); min-width: 140px; flex-shrink: 0;">
            <div class="val" id="stat-pending">0</div>
            <div class="lbl">معلقة</div>
        </div>
        <div class="stat-card" style="border-top-color: #3b82f6; min-width: 140px; flex-shrink: 0;">
            <div class="val" id="stat-progress">0</div>
            <div class="lbl">قيد التنفيذ</div>
        </div>
        <div class="stat-card" style="border-top-color: var(--success); min-width: 140px; flex-shrink: 0;">
            <div class="val" id="stat-done">0</div>
            <div class="lbl">مكتملة</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">➕ مهمة جديدة</div>
        <form id="taskForm" onsubmit="handleSave(event)">
            <input type="hidden" id="edit-id" value="-1">
            <div class="form-grid">
                <div class="field">
                    <label>عنوان المهمة *</label>
                    <input type="text" id="task_title" placeholder="مثال: إعداد تقرير الموقع" required>
                </div>
                <div class="field">
                    <label>المشروع *</label>
                    <select id="project_id" required>
                        <option value="">-- اختر المشروع --</option>
                    </select>
                </div>
                <div class="field">
                    <label>الموظف المسؤول *</label>
                    <select id="employee_id" required>
                        <option value="">-- اختر الموظف --</option>
                    </select>
                </div>
                <div class="field">
                    <label>الأولوية</label>
                    <select id="priority">
                        <option value="عالية">🔴 عالية</option>
                        <option value="متوسطة" selected>🟡 متوسطة</option>
                        <option value="منخفضة">🔵 منخفضة</option>
                    </select>
                </div>
                <div class="field">
                    <label>تاريخ التسليم *</label>
                    <input type="date" id="due_date" required>
                </div>
                <div class="field">
                    <label>الحالة</label>
                    <select id="status">
                        <option value="معلقة">⏳ معلقة</option>
                        <option value="قيد التنفيذ">🔄 قيد التنفيذ</option>
                        <option value="مكتملة">✅ مكتملة</option>
                    </select>
                </div>
                <div class="field" style="grid-column: 1 / -1;">
                    <label>ملاحظات / وصف المهمة</label>
                    <textarea id="notes" rows="3" placeholder="تفاصيل إضافية عن المهمة..."></textarea>
                </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" id="submit-btn">💾 حفظ المهمة</button>
                <button type="button" class="btn btn-danger" onclick="resetForm()" style="display:none" id="cancel-btn">❌ إلغاء</button>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-title">📋 قائمة المهام</div>
        <div class="toolbar">
            <div class="field">
                <label>تصفية حسب المشروع</label>
                <select id="filter-project" onchange="renderList()">
                    <option value="">الكل</option>
                </select>
            </div>
            <div class="field">
                <label>تصفية حسب الحالة</label>
                <select id="filter-status" onchange="renderList()">
                    <option value="">الكل</option>
                    <option value="معلقة">⏳ معلقة</option>
                    <option value="قيد التنفيذ">🔄 قيد التنفيذ</option>
                    <option value="مكتملة">✅ مكتملة</option>
                </select>
            </div>
            <div class="field">
                <label>بحث</label>
                <input type="text" id="search-input" placeholder="ابحث في المهام..." oninput="renderList()">
            </div>
        <div id="tasks-table"></div>
</div>

<script>
    const SK_TASKS = 'saden_project_tasks';
    const SK_PROJECTS = 'saden_projects';
    const SK_EMPLOYEES = 'saden_employees';

    let tasks = [];
    let projects = [];
    let employees = [];

    function loadData() {
        tasks = JSON.parse(localStorage.getItem(SK_TASKS) || '[]');
        projects = JSON.parse(localStorage.getItem(SK_PROJECTS) || '[]');
        employees = JSON.parse(localStorage.getItem(SK_EMPLOYEES) || '[]');
        populateDropdowns();
        renderList();
        updateStats();
    }

    function populateDropdowns() {
        const projectSelect = document.getElementById('project_id');
        const filterProject = document.getElementById('filter-project');
        const employeeSelect = document.getElementById('employee_id');

        // Projects
        const projectOptions = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        if(projectSelect) {
            projectSelect.innerHTML = '<option value="">-- اختر المشروع --</option>' + projectOptions;
        }
        if(filterProject) {
            filterProject.innerHTML = '<option value="">الكل</option>' + projectOptions;
        }

        // Employees from HRMS
        const employeeOptions = employees.map(e => `<option value="${e.emp_number || e.id}">${e.emp_name} (${e.company_job || 'بدون مسمى'})</option>`).join('');
        if(employeeSelect) {
            employeeSelect.innerHTML = '<option value="">-- اختر الموظف --</option>' + (employeeOptions || '<option value="">لا يوجد موظفين في النظام</option>');
        }
    }

    function getProjectName(id) {
        const p = projects.find(x => x.id == id);
        return p ? p.name : '—';
    }

    function getEmployeeName(id) {
        const e = employees.find(x => (x.emp_number || x.id) == id);
        return e ? e.emp_name : '—';
    }

    function getStatusBadge(status) {
        const map = {
            'معلقة': 'badge-pending',
            'قيد التنفيذ': 'badge-progress',
            'مكتملة': 'badge-done'
        };
        return `<span class="badge ${map[status] || 'badge-pending'}">${status}</span>`;
    }

    function getPriorityBadge(priority) {
        const map = {
            'عالية': 'badge-high',
            'متوسطة': 'badge-medium',
            'منخفضة': 'badge-low'
        };
        return `<span class="badge ${map[priority] || 'badge-medium'}">${priority}</span>`;
    }

    function isOverdue(dueDate, status) {
        if(status === 'مكتملة') return false;
        return new Date(dueDate) < new Date().setHours(0,0,0,0);
    }

    function handleSave(e) {
        e.preventDefault();

        const data = {
            id: document.getElementById('edit-id').value === '-1' ? 't_' + Date.now() : document.getElementById('edit-id').value,
            title: document.getElementById('task_title').value.trim(),
            project_id: document.getElementById('project_id').value,
            employee_id: document.getElementById('employee_id').value,
            employee_name: getEmployeeName(document.getElementById('employee_id').value),
            priority: document.getElementById('priority').value,
            due_date: document.getElementById('due_date').value,
            status: document.getElementById('status').value,
            notes: document.getElementById('notes').value.trim(),
            created_at: new Date().toISOString()
        };

        if(!data.title || !data.project_id || !data.employee_id || !data.due_date) {
            alert('❌ يرجى ملء جميع الحقول المطلوبة');
            return;
        }

        const editId = document.getElementById('edit-id').value;
        if(editId === '-1') {
            tasks.push(data);
            alert('✅ تم إضافة المهمة بنجاح');
        } else {
            const idx = tasks.findIndex(t => t.id === editId);
            if(idx !== -1) {
                tasks[idx] = data;
                alert('✅ تم تحديث المهمة بنجاح');
            }
        }

        saveTasks();
        resetForm();
        renderList();
        updateStats();
    }

    function saveTasks() {
        localStorage.setItem(SK_TASKS, JSON.stringify(tasks));
    }

    function resetForm() {
        document.getElementById('taskForm').reset();
        document.getElementById('edit-id').value = '-1';
        document.getElementById('submit-btn').textContent = '💾 حفظ المهمة';
        document.getElementById('cancel-btn').style.display = 'none';
    }

    function editTask(id) {
        const task = tasks.find(t => t.id === id);
        if(!task) return;

        document.getElementById('edit-id').value = task.id;
        document.getElementById('task_title').value = task.title;
        document.getElementById('project_id').value = task.project_id;
        document.getElementById('employee_id').value = task.employee_id;
        document.getElementById('priority').value = task.priority;
        document.getElementById('due_date').value = task.due_date;
        document.getElementById('status').value = task.status;
        document.getElementById('notes').value = task.notes || '';

        document.getElementById('submit-btn').textContent = '✅ تحديث المهمة';
        document.getElementById('cancel-btn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteTask(id) {
        if(!confirm('هل أنت متأكد من حذف هذه المهمة؟')) return;
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderList();
        updateStats();
    }

    function toggleStatus(id) {
        const task = tasks.find(t => t.id === id);
        if(!task) return;

        const statuses = ['معلقة', 'قيد التنفيذ', 'مكتملة'];
        const currentIdx = statuses.indexOf(task.status);
        task.status = statuses[(currentIdx + 1) % statuses.length];
        saveTasks();
        renderList();
        updateStats();
    }

    function renderList() {
        const container = document.getElementById('tasks-table');
        const filterProject = document.getElementById('filter-project')?.value || '';
        const filterStatus = document.getElementById('filter-status')?.value || '';
        const searchQuery = (document.getElementById('search-input')?.value || '').trim().toLowerCase();

        let filtered = tasks;

        if(filterProject) {
            filtered = filtered.filter(t => t.project_id === filterProject);
        }
        if(filterStatus) {
            filtered = filtered.filter(t => t.status === filterStatus);
        }
        if(searchQuery) {
            filtered = filtered.filter(t =>
                (t.title || '').toLowerCase().includes(searchQuery) ||
                (t.notes || '').toLowerCase().includes(searchQuery) ||
                getEmployeeName(t.employee_id).toLowerCase().includes(searchQuery)
            );
        }

        // Sort: overdue first, then by due date
        filtered.sort((a, b) => {
            const aOverdue = isOverdue(a.due_date, a.status) ? 1 : 0;
            const bOverdue = isOverdue(b.due_date, b.status) ? 1 : 0;
            if(aOverdue !== bOverdue) return bOverdue - aOverdue;
            return new Date(a.due_date) - new Date(b.due_date);
        });

        if(!filtered.length) {
            container.innerHTML = '<div class="empty-msg">لا توجد مهام مسجلة</div>';
            return;
        }

        let html = `<table class="data-table">
            <thead>
                <tr>
                    <th>المهمة</th>
                    <th>المشروع</th>
                    <th>الموظف</th>
                    <th>الأولوية</th>
                    <th>التسليم</th>
                    <th>الحالة</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody>`;

        filtered.forEach(task => {
            const overdue = isOverdue(task.due_date, task.status);
            const dueDateStyle = overdue ? 'color: var(--danger); font-weight: 700;' : '';

            html += `<tr>
                <td>
                    <div style="font-weight: 700;">${task.title}</div>
                    ${task.notes ? `<div style="font-size: 11px; color: #64748b; margin-top: 3px;">${task.notes}</div>` : ''}
                </td>
                <td>${getProjectName(task.project_id)}</td>
                <td>${getEmployeeName(task.employee_id)}</td>
                <td>${getPriorityBadge(task.priority)}</td>
                <td style="${dueDateStyle}">
                    ${overdue ? '⚠️ ' : ''}${task.due_date}
                </td>
                <td>${getStatusBadge(task.status)}</td>
                <td>
                    <div class="actions">
                        <button class="btn btn-primary" style="padding: 5px 10px;" onclick="toggleStatus('${task.id}')" title="تغيير الحالة">🔄</button>
                        <button class="btn btn-warning" style="padding: 5px 10px;" onclick="editTask('${task.id}')" title="تعديل">✏️</button>
                        <button class="btn btn-danger" style="padding: 5px 10px;" onclick="deleteTask('${task.id}')" title="حذف">🗑️</button>
                    </div>
                </td>
            </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function updateStats() {
        document.getElementById('stat-total').textContent = tasks.length;
        document.getElementById('stat-pending').textContent = tasks.filter(t => t.status === 'معلقة').length;
        document.getElementById('stat-progress').textContent = tasks.filter(t => t.status === 'قيد التنفيذ').length;
        document.getElementById('stat-done').textContent = tasks.filter(t => t.status === 'مكتملة').length;
    }

    // Listen for storage changes
    window.addEventListener('storage', function(e) {
        if(e.key === SK_PROJECTS || e.key === SK_EMPLOYEES || e.key === SK_TASKS) {
            loadData();
        }
    });

    // Initial load
    loadData();
</script>

</body>
</html>
