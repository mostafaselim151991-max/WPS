<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سادن | السلف</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary-blue: #1e293b; --accent-blue: #3b82f6; 
            --loan-green: #dcfce7; --loan-text: #166534;
            --deduct-red: #fee2e2; --deduct-text: #991b1b;
            --remain-bg: #0f172a; --bg: #f1f5f9; 
        }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        
        .branches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .branch-card { background: white; padding: 30px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.3s; font-weight: bold; font-size: 18px; }
        .branch-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); color: var(--accent-blue); }

        .branch-summary { background: white; border-radius: 12px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-around; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-top: 5px solid var(--primary-blue); }
        .summary-item h4 { margin: 0; color: #64748b; font-size: 14px; }
        .summary-item p { margin: 8px 0 0; font-size: 22px; font-weight: 800; color: var(--primary-blue); }
        
        .employee-block { background: white; margin-bottom: 35px; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; page-break-inside: avoid; }
        .erp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .erp-table th { background-color: var(--primary-blue); color: white; padding: 12px 8px; }
        .erp-table td { border: 1px solid #e2e8f0; padding: 10px 8px; text-align: center; }
        .loan-val-col { background-color: var(--loan-green); color: var(--loan-text); font-weight: bold; }
        .deduct-val-col { background-color: var(--deduct-red); color: var(--deduct-text); font-weight: bold; }
        .remaining-row { background-color: var(--remain-bg); color: white; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); z-index: 9999; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 420px; margin: 5% auto; padding: 30px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Tajawal'; outline: none; }
        
        .btn { cursor: pointer; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; font-family: 'Tajawal'; transition: 0.2s; }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-success { background: #059669; color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; }

        .report-controls { background: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; display: flex; align-items: center; gap: 10px; }
        .final-report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .final-report-table th, .final-report-table td { border: 2px solid #1e293b; padding: 12px; text-align: center; font-weight: bold; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

    <div id="branchesSection" class="no-print">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>🏢 سجل السلف</h1>
            <button class="btn btn-success" onclick="openBranchModal()">➕ إضافة فرع جديد</button>
        </div>
        <div id="branchesGrid" class="branches-grid"></div>
    </div>

    <div id="loanSheetSection" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap: wrap; gap:15px;" class="no-print">
            <h2 id="activeBranchTitle"></h2>
            
            <div style="display:flex; gap:10px; align-items: center;">
                <div class="report-controls">
                    <label style="font-size: 13px; font-weight: bold;">استخراج تقرير:</label>
                    <select id="reportMainSelect" onchange="handleReportSelection()">
                        <option value="">-- اختر النوع --</option>
                        <option value="full_branch">📥 كشف سلف الفرع (كامل)</option>
                        <option value="employee_only">👤 كشف سلف موظف محدد</option>
                    </select>
                    <select id="reportEmployeeSelect" style="display:none;" onchange="downloadEmployeePDF()">
                        <option value="">-- اختر اسم الموظف --</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="openLoanModal()">👤 إضافة سلفة</button>
                <button class="btn btn-outline" onclick="backToMain()">⬅️ عودة</button>
            </div>
        </div>

        <div class="branch-summary no-print">
            <div class="summary-item"><h4>إجمالي السلف</h4><p id="topTotalLoans">0</p></div>
            <div class="summary-item"><h4>إجمالي المحصل</h4><p id="topTotalDeducts">0</p></div>
            <div class="summary-item"><h4>صافي المديونية</h4><p id="topNet" style="color:#2563eb">0</p></div>
        </div>

        <div id="pdfArea">
            <div id="employeesTablesContainer"></div>
            <div id="pdfSummarySection" style="margin-top:40px; border-top:2px solid #000; padding-top:20px;">
                <h3 style="text-align:center;">الملخص المالي الإجمالي للفرع</h3>
                <table class="final-report-table">
                    <thead><tr><th>إجمالي السلف</th><th>إجمالي المخصوم</th><th>صافي المتبقي</th></tr></thead>
                    <tbody><tr><td id="pdfSumL">0</td><td id="pdfSumD">0</td><td id="pdfSumN">0</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="branchModal" class="modal">
        <div class="modal-content">
            <h3>إضافة فرع جديد</h3>
            <div class="input-group">
                <label>اختر المنطقة والفرع:</label>
                <select id="branchSelect" onchange="checkOtherBranch()">
                    <option value="">-- اختر من القائمة --</option>
                    
                    <optgroup label="المنطقة الجنوبية">
                        <option value="خميس مشيط">خميس مشيط</option>
                        <option value="مختبر أمانة عسير">مختبر أمانة عسير</option>
                        <option value="جيزان">جيزان</option>
                        <option value="نجران">نجران</option>
                        <option value="بيشة">بيشة</option>
                    </optgroup>

                    <optgroup label="المنطقة الشمالية">
                        <option value="حائل">حائل</option>
                        <option value="سكاكا">سكاكا</option>
                        <option value="تبوك">تبوك</option>
                        <option value="المدينة المنورة">المدينة المنورة</option>
                    </optgroup>

                    <optgroup label="الشرقية والوسطى">
                        <option value="الرياض">الرياض</option>
                        <option value="الدمام">الدمام</option>
                        <option value="حفر الباطن">حفر الباطن</option>
                        <option value="القصيم">القصيم</option>
                    </optgroup>

                    <optgroup label="المنطقة الغربية">
                        <option value="مكة المكرمة">مكة المكرمة</option>
                        <option value="جدة">جدة</option>
                        <option value="الطائف">الطائف</option>
                        <option value="الباحة">الباحة</option>
                    </optgroup>

                    <optgroup label="خيارات أخرى">
                        <option value="other">--- أخرى (إدخال يدوي) ---</option>
                    </optgroup>
                </select>
                <input type="text" id="manualBranch" placeholder="اكتب اسم الفرع الجديد هنا" style="display:none; margin-top:10px;">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="addNewBranch()">تأكيد الإضافة</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="closeModals()">إلغاء</button>
        </div>
    </div>

    <div id="loanModal" class="modal">
        <div class="modal-content">
            <h3>تسجيل موظف وسلفة</h3>
            <div class="input-group"><label>الهوية</label><input type="text" id="mId"></div>
            <div class="input-group"><label>الاسم</label><input type="text" id="mName"></div>
            <div class="input-group"><label>نوع السلفة</label>
                <select id="mType">
                    <option value="سلفة شخصية">سلفة شخصية</option>
                    <option value="سلفة بضمان بدل السكن">سلفة بضمان بدل السكن</option>
                    <option value="سلف اخرى">سلف أخرى</option>
                </select>
            </div>
            <div class="input-group"><label>المبلغ</label><input type="number" id="mAmount"></div>
            <div class="input-group"><label>التاريخ</label><input type="date" id="mDate"></div>
            <button class="btn btn-primary" style="width:100%" onclick="saveEmployee()">حفظ البيانات</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="closeModals()">إلغاء</button>
        </div>
    </div>

    <div id="deductModal" class="modal">
        <div class="modal-content">
            <h3 id="deductTitle">تسجيل خصم</h3>
            <div class="input-group"><label>المبلغ</label><input type="number" id="dAmount"></div>
            <div class="input-group"><label>البيان</label><input type="text" id="dDesc"></div>
            <div class="input-group"><label>التاريخ</label><input type="date" id="dDate"></div>
            <button class="btn btn-primary" style="width:100%" onclick="saveDeduction()">تأكيد</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="closeModals()">إلغاء</button>
        </div>
    </div>

<script>
    let db = JSON.parse(localStorage.getItem('saden_v10_system')) || {};
    let activeBranch = "";
    let activeEmpIdx = -1, activeRecIdx = -1;

    function renderBranchCards() {
        const grid = document.getElementById('branchesGrid'); grid.innerHTML = "";
        Object.keys(db).forEach(name => {
            const card = document.createElement('div');
            card.className = "branch-card"; card.innerText = name;
            card.onclick = () => openBranch(name);
            grid.appendChild(card);
        });
    }

    function openBranch(name) {
        activeBranch = name;
        document.getElementById('branchesSection').style.display = 'none';
        document.getElementById('loanSheetSection').style.display = 'block';
        document.getElementById('activeBranchTitle').innerText = "فرع: " + name;
        updateEmployeeReportList(); // تحديث قائمة الموظفين في التقارير
        renderTables();
    }

    // إدارة اختيار التقارير
    function handleReportSelection() {
        const mainSelect = document.getElementById('reportMainSelect');
        const empSelect = document.getElementById('reportEmployeeSelect');
        
        if (mainSelect.value === 'full_branch') {
            empSelect.style.display = 'none';
            downloadFullPDF();
            mainSelect.value = ""; // إعادة التصفير
        } else if (mainSelect.value === 'employee_only') {
            empSelect.style.display = 'inline-block';
        } else {
            empSelect.style.display = 'none';
        }
    }

    // تحديث قائمة الموظفين في القائمة المنسدلة للتقارير
    function updateEmployeeReportList() {
        const select = document.getElementById('reportEmployeeSelect');
        select.innerHTML = '<option value="">-- اختر اسم الموظف --</option>';
        if (db[activeBranch]) {
            db[activeBranch].forEach((emp, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.innerText = emp.name;
                select.appendChild(opt);
            });
        }
    }

    // تحميل PDF لموظف واحد
    function downloadEmployeePDF() {
        const idx = document.getElementById('reportEmployeeSelect').value;
        if (idx === "") return;
        
        const employeeBlock = document.getElementById(`emp-block-${idx}`);
        const empName = db[activeBranch][idx].name;
        
        const opt = {
            margin: 0.5,
            filename: `كشف_سلف_${empName}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
        };
        
        html2pdf().set(opt).from(employeeBlock).save();
        
        // إعادة تصفير القوائم بعد التحميل
        document.getElementById('reportEmployeeSelect').value = "";
        document.getElementById('reportMainSelect').value = "";
        document.getElementById('reportEmployeeSelect').style.display = 'none';
    }

    function downloadFullPDF() {
        const el = document.getElementById('pdfArea');
        html2pdf().set({ margin:0.3, filename:`كشف_فرع_${activeBranch}.pdf`, jsPDF:{orientation:'landscape'} }).from(el).save();
    }

    function renderTables() {
        const container = document.getElementById('employeesTablesContainer');
        container.innerHTML = "";
        let bL = 0, bD = 0;
        db[activeBranch].forEach((emp, empIdx) => {
            const ls = emp.records.filter(r => r.type === 'loan');
            const ds = emp.records.map((r, i) => ({...r, i})).filter(r => r.type === 'deduct');
            const maxRows = Math.max(ls.length, ds.length, 5);
            let sL = 0, sD = 0, rowsHtml = "";
            for (let i = 0; i < maxRows; i++) {
                const l = ls[i] || {}; const d = ds[i] || {};
                if(l.amount) sL += l.amount; if(d.amount) sD += d.amount;
                rowsHtml += `<tr>
                    ${i===0 ? `<td rowspan="${maxRows}" style="background:#f8fafc; font-weight:bold;">${emp.name}<br><small>ID: ${emp.id}</small></td>`:''}
                    <td class="loan-val-col">${l.amount?.toLocaleString() || ''}</td><td>${l.desc || ''}</td><td>${l.date || ''}</td>
                    <td class="deduct-val-col">${d.amount?.toLocaleString() || ''}</td>
                    <td>${d.desc || ''} ${d.amount ? `<div class="no-print" style="font-size:10px;"><span onclick="openDeductModal(${empIdx},${d.i})" style="color:blue; cursor:pointer">تعديل</span> | <span onclick="deleteRecord(${empIdx},${d.i})" style="color:red; cursor:pointer">حذف</span></div>`:''}</td>
                    <td>${d.date || ''}</td>
                </tr>`;
            }
            bL += sL; bD += sD;
            // إضافة معرف ID لكل بلوك موظف ليسهل طباعته منفرداً
            container.innerHTML += `
                <div class="employee-block" id="emp-block-${empIdx}">
                    <table class="erp-table">
                        <thead><tr><th>مستلم السلفه</th><th>قيمة السلفة</th><th>البيان</th><th>التاريخ</th><th>المخصوم</th><th>ملاحظات</th><th>التاريخ</th></tr></thead>
                        <tbody>${rowsHtml}</tbody>
                        <tfoot>
                            <tr style="background:#f1f5f9; font-weight:bold;"><td>إجمالي الموظف</td><td>${sL.toLocaleString()}</td><td colspan="2"></td><td>${sD.toLocaleString()}</td><td colspan="2"></td></tr>
                            <tr class="remaining-row"><td>المتبقي</td><td colspan="6">${(sL-sD).toLocaleString()}</td></tr>
                        </tfoot>
                    </table>
                    <div class="no-print" style="padding:10px;">
                        <button class="btn btn-primary" style="font-size:12px;" onclick="openDeductModal(${empIdx})">➕ إضافة خصم</button>
                    </div>
                </div>`;
        });
        document.getElementById('topTotalLoans').innerText = document.getElementById('pdfSumL').innerText = bL.toLocaleString();
        document.getElementById('topTotalDeducts').innerText = document.getElementById('pdfSumD').innerText = bD.toLocaleString();
        document.getElementById('topNet').innerText = document.getElementById('pdfSumN').innerText = (bL - bD).toLocaleString();
    }

    // باقي الدوال (الحفظ والإضافة) كما هي بدون تغيير
    function backToMain() { document.getElementById('branchesSection').style.display = 'block'; document.getElementById('loanSheetSection').style.display = 'none'; renderBranchCards(); }
    function openBranchModal() { document.getElementById('branchModal').style.display = 'block'; }
    function checkOtherBranch() { document.getElementById('manualBranch').style.display = (document.getElementById('branchSelect').value === 'other') ? 'block' : 'none'; }
    function addNewBranch() {
        let name = document.getElementById('branchSelect').value;
        if(name === 'other') name = document.getElementById('manualBranch').value.trim();
        if(name && !db[name]) { db[name] = []; saveDB(); renderBranchCards(); closeModals(); }
    }
    function openLoanModal() { document.querySelectorAll('#loanModal input').forEach(i => i.value = ""); document.getElementById('mDate').value = new Date().toISOString().split('T')[0]; document.getElementById('loanModal').style.display = 'block'; }
    function saveEmployee() {
        const name = document.getElementById('mName').value; const id = document.getElementById('mId').value;
        const amount = parseFloat(document.getElementById('mAmount').value); const type = document.getElementById('mType').value;
        const date = document.getElementById('mDate').value; if(!name || !amount) return;
        db[activeBranch].push({ name, id, records: [{ type:'loan', amount, desc: type, date }] });
        saveDB(); updateEmployeeReportList(); renderTables(); closeModals();
    }
    function openDeductModal(empIdx, recIdx = -1) {
        activeEmpIdx = empIdx; activeRecIdx = recIdx;
        if(recIdx === -1) {
            document.getElementById('deductTitle').innerText = "➕ إضافة خصم";
            document.getElementById('dAmount').value = ""; document.getElementById('dDesc').value = "";
            document.getElementById('dDate').value = new Date().toISOString().split('T')[0];
        } else {
            document.getElementById('deductTitle').innerText = "✏️ تعديل خصم";
            const r = db[activeBranch][empIdx].records[recIdx];
            document.getElementById('dAmount').value = r.amount; document.getElementById('dDesc').value = r.desc; document.getElementById('dDate').value = r.date;
        }
        document.getElementById('deductModal').style.display = 'block';
    }
    function saveDeduction() {
        const emp = db[activeBranch][activeEmpIdx]; const amount = parseFloat(document.getElementById('dAmount').value);
        const desc = document.getElementById('dDesc').value; const date = document.getElementById('dDate').value;
        if(activeRecIdx === -1) emp.records.push({ type:'deduct', amount, desc, date });
        else emp.records[activeRecIdx] = { type:'deduct', amount, desc, date };
        saveDB(); renderTables(); closeModals();
    }
    function deleteRecord(empIdx, recIdx) { if(confirm("حذف العملية؟")) { db[activeBranch][empIdx].records.splice(recIdx, 1); saveDB(); renderTables(); } }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function saveDB() { localStorage.setItem('saden_v10_system', JSON.stringify(db)); }
    renderBranchCards();
</script>
</body>
</html>
