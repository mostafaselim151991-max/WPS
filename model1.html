<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --navy: #0f172a; --blue: #2563eb; --emerald: #059669; --rose: #e11d48; --bg: #f1f5f9; }
        .jv-container { background: white; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); padding: 25px; margin: 20px; border-top: 5px solid var(--navy); }
        .jv-header { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        
        .jv-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .jv-table th { background: var(--navy); color: white; padding: 12px; text-align: right; font-size: 14px; }
        .jv-table td { padding: 8px; border: 1px solid #e2e8f0; }
        
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: 'Tajawal'; }
        input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
        
        .row-actions button { background: none; border: none; color: var(--rose); cursor: pointer; font-weight: bold; }
        .footer-summary { display: flex; justify-content: flex-end; gap: 40px; margin-top: 20px; padding: 15px; background: #1e293b; color: white; border-radius: 8px; }
        
        .status-badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; }
        .balanced { background: #dcfce7; color: #166534; }
        .unbalanced { background: #fee2e2; color: #991b1b; }
        
        .btn-post { background: var(--emerald); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-post:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-add-row { background: var(--blue); color: white; padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="jv-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0; color: var(--navy);">سند قيد يومية (JV)</h2>
        <div id="balanceLabel" class="status-badge unbalanced">غير متزن</div>
    </div>

    <div class="jv-header">
        <div><label>رقم القيد</label><input type="text" value="JV-2026-001" readonly style="background:#eee"></div>
        <div><label>التاريخ</label><input type="date" id="jvDate"></div>
        <div style="grid-column: span 2;"><label>البيان العام</label><input type="text" id="jvMemo" placeholder="وصف العملية المالية للسند بالكامل..."></div>
    </div>

    <table class="jv-table" id="jvTable">
        <thead>
            <tr>
                <th width="30%">الحساب (الكود - الاسم)</th>
                <th width="15%">مدين (Debit)</th>
                <th width="15%">دائن (Credit)</th>
                <th width="25%">مركز التكلفة / المشروع</th>
                <th width="10%">ملاحظات</th>
                <th width="5%"></th>
            </tr>
        </thead>
        <tbody id="jvBody">
            </tbody>
    </table>

    <button class="btn-add-row" onclick="addRow()">➕ إضافة سطر جديد</button>

    <div class="footer-summary">
        <div>إجمالي المدين: <span id="totalDebit">0.00</span></div>
        <div>إجمالي الدائن: <span id="totalCredit">0.00</span></div>
        <div style="border-right: 1px solid #475569; padding-right: 20px;">الفرق: <span id="difference">0.00</span></div>
    </div>

    <div style="text-align: left; margin-top: 25px;">
        <button class="btn-post" onclick="postJournal()">ترحيل القيد للحسابات (Posting) ✅</button>
    </div>
</div>

<script>
    // الحسابات المستخرجة من صورتك
    const accounts = [
        {code: '11007', name: 'آلات ومعدات الورش والحفر'},
        {code: '12001', name: 'الصناديق'},
        {code: '13', name: 'عهد نقدية'},
        {code: '28', name: 'الموردون'},
        {code: '32', name: 'تكلفة تشغيلية للمشروعات'},
        {code: '33', name: 'رواتب وأجور'}
    ];

    const projects = ['مشروع جيزان - فحص تربة', 'مشروع نجران - مسح جيولوجي', 'مكتب الخميس - إداري'];

    function addRow() {
        const tbody = document.getElementById('jvBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>
                <select class="acc-select">
                    <option value="">اختر الحساب...</option>
                    ${accounts.map(a => `<option value="${a.code}">${a.code} - ${a.name}</option>`).join('')}
                </select>
            </td>
            <td><input type="number" class="debit-input" value="0" oninput="calculateTotals()"></td>
            <td><input type="number" class="credit-input" value="0" oninput="calculateTotals()"></td>
            <td>
                <select>
                    <option value="">-- بدون --</option>
                    ${projects.map(p => `<option>${p}</option>`).join('')}
                </select>
            </td>
            <td><input type="text" placeholder="شرح مختصر"></td>
            <td class="row-actions"><button onclick="this.parentElement.parentElement.remove(); calculateTotals();">✖</button></td>
        `;
        tbody.appendChild(row);
    }

    function calculateTotals() {
        let tDebit = 0, tCredit = 0;
        document.querySelectorAll('.debit-input').forEach(i => tDebit += parseFloat(i.value || 0));
        document.querySelectorAll('.credit-input').forEach(i => tCredit += parseFloat(i.value || 0));

        const diff = Math.abs(tDebit - tCredit);
        document.getElementById('totalDebit').innerText = tDebit.toFixed(2);
        document.getElementById('totalCredit').innerText = tCredit.toFixed(2);
        document.getElementById('difference').innerText = diff.toFixed(2);

        const label = document.getElementById('balanceLabel');
        if (diff === 0 && tDebit > 0) {
            label.innerText = "متزن";
            label.className = "status-badge balanced";
        } else {
            label.innerText = "غير متزن";
            label.className = "status-badge unbalanced";
        }
    }

    function postJournal() {
        const diff = parseFloat(document.getElementById('difference').innerText);
        if (diff !== 0) {
            alert("خطأ: لا يمكن ترحيل قيد غير متزن!");
            return;
        }
        alert("تم ترحيل القيد بنجاح! سيتم الآن تحديث أرصدة الحسابات في ميزان المراجعة.");
    }

    // إضافة سطرين عند البداية
    addRow(); addRow();
    document.getElementById('jvDate').valueAsDate = new Date();
</script>
</body>
</html>
