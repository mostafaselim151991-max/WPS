<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام سادن | الرواتب بنظام الكفالات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --navy: #1e293b; --green: #166534; --blue: #3b82f6; --light-bg: #f1f5f9; }
        body { font-family: 'Tajawal', sans-serif; background: var(--light-bg); padding: 20px; margin: 0; }
        
        .regions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .region-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .region-header { background: var(--navy); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .branch-btn { display: block; width: 90%; margin: 10px auto; padding: 12px; background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; text-align: center; font-weight: 500; transition: 0.3s; }
        .branch-btn:hover { background: var(--blue); color: white; }

        .payroll-page { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 99%; margin: auto; }
        .header-box { text-align: center; border-bottom: 3px solid var(--navy); margin-bottom: 15px; }
        
        .kofala-block { margin-top: 30px; border: 2px solid #cbd5e1; border-radius: 8px; overflow: hidden; background: white; margin-bottom: 20px; }
        .kofala-header { background: #334155; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .payroll-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .payroll-table th { background: var(--navy); color: white; border: 1px solid #475569; padding: 8px 2px; }
        .payroll-table td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        
        .input-cell { width: 45px; border: 1px solid #ddd; padding: 5px; text-align: center; font-size: 10px; border-radius: 4px; }
        .wide-cell { width: 120px; }
        .bank-cell { width: 100px; } /* عرض مخصص للبنك والآيبان */
        .net-highlight { background: #dcfce7 !important; color: #166534 !important; font-weight: bold; }
        .gosi-cell { background: #fff7ed; font-weight: bold; color: #9a3412; }

        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; transition: 0.2s; }
        .btn-save { background: var(--green); color: white; }
        .btn-add { background: var(--blue); color: white; }
        .save-toast { position: fixed; bottom: 20px; left: 20px; background: #22c55e; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="dashboardPage">
    <div class="header-box"><h2>شركة سادن المتخصصة للاستشارات الجيولوجية</h2><p>نظام إدارة الفروع والكفالات</p></div>
    <div class="regions-grid" id="regionsContainer"></div>
</div>

<div id="payrollPage" class="payroll-page">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button class="btn" style="background:#64748b; color:white" onclick="showDashboard()">⬅ العودة للمناطق</button>
        <h2 id="currentBranchDisplay" style="color:var(--navy)"></h2>
        <div>
            <button class="btn btn-add" onclick="addNewKofala()">➕ إدراج كفالة جديدة</button>
            <button class="btn btn-save" onclick="saveData()">💾 حفظ بيانات الفرع</button>
            <button class="btn" style="background:#065f46; color:white" onclick="exportToExcel()">📊 Excel</button>
        </div>
    </div>
    <div id="kofalatContainer"></div>
</div>

<div id="saveToast" class="save-toast">✓ تم حفظ البيانات بنجاح</div>

<script>
    const regions = {
        "المنطقة الجنوبية": ["خميس مشيط", "مختبر أمانة عسير", "جيزان", "نجران", "بيشة"],
        "الشرقية والوسطى": ["الرياض", "الدمام", "حفر الباطن", "القصيم"],
        "المنطقة الشمالية": ["حائل", "سكاكا", "تبوك", "المدينة المنورة"],
        "المنطقة الغربية": ["مكة المكرمة", "جدة", "الطائف", "الباحة"]
    };

    let allData = JSON.parse(localStorage.getItem('saden_kofalat_db')) || {};
    let currentBranch = "";

    function initDashboard() {
        const container = document.getElementById('regionsContainer');
        container.innerHTML = "";
        for (let region in regions) {
            container.insertAdjacentHTML('beforeend', `
                <div class="region-card">
                    <div class="region-header">${region}</div>
                    <div style="padding:10px">${regions[region].map(b => `<button class="branch-btn" onclick="openBranch('${b}')">${b}</button>`).join('')}</div>
                </div>`);
        }
    }

    function openBranch(branch) {
        currentBranch = branch;
        document.getElementById('dashboardPage').style.display = 'none';
        document.getElementById('payrollPage').style.display = 'block';
        document.getElementById('currentBranchDisplay').innerText = "فرع: " + branch;
        if (!allData[currentBranch]) allData[currentBranch] = [];
        renderKofalat();
    }

    function showDashboard() {
        document.getElementById('dashboardPage').style.display = 'block';
        document.getElementById('payrollPage').style.display = 'none';
    }

    function createEmp() {
        return { 
            status: "دوام", clearance: 0, name: "", nat: "مقيم", 
            basic: 0, saken: 0, car: 0, mobile: 0, site: 0, residence: 0, otherFix: 0, 
            gosiDeduct: 0, bankName: "", bankIban: "", notes: "" 
        };
    }

    function addNewKofala() {
        allData[currentBranch].push({ id: Date.now(), title: "اسم الكفالة", employees: [createEmp()] });
        renderKofalat();
    }

    function addEmpToKofala(kIdx) {
        allData[currentBranch][kIdx].employees.push(createEmp());
        renderKofalat();
    }

    function updateEmp(kIdx, eIdx, field, val) {
        let emp = allData[currentBranch][kIdx].employees[eIdx];
        emp[field] = (typeof createEmp()[field] === 'number') ? (parseFloat(val) || 0) : val;
        renderKofalat();
    }

    function renderKofalat() {
        const container = document.getElementById('kofalatContainer');
        container.innerHTML = "";
        allData[currentBranch].forEach((kofala, kIdx) => {
            let kNet = 0;
            let block = `
                <div class="kofala-block">
                    <div class="kofala-header">
                        <input type="text" class="input-cell wide-cell" value="${kofala.title}" onchange="allData[currentBranch][${kIdx}].title=this.value">
                        <button class="btn btn-add" style="padding:4px 10px" onclick="addEmpToKofala(${kIdx})">➕ موظف</button>
                    </div>
                    <table class="payroll-table">
                        <thead>
                            <tr>
                                <th rowspan="2">م</th><th rowspan="2">الحالة</th><th rowspan="2">مبلغ التصفية</th><th rowspan="2">الإسم</th>
                                <th rowspan="2">الجنسية</th><th rowspan="2">الأساسي</th><th rowspan="2">سكن</th>
                                <th colspan="5">بدلات</th><th rowspan="2">تأمينات(خ)</th><th rowspan="2">الصافي</th>
                                <th rowspan="2">تأمينات(الشركة)</th><th rowspan="2">اسم البنك</th><th rowspan="2">الآيبان</th><th rowspan="2">ملاحظات</th>
                            </tr>
                            <tr style="background:#475569">
                                <td>سيارة</td><td>جوال</td><td>موقع</td><td>إقامة</td><td>أخرى</td>
                            </tr>
                        </thead>
                        <tbody>`;

            kofala.employees.forEach((emp, eIdx) => {
                let isVac = emp.status === "أجازة", isClear = emp.status === "تصفية";
                let gRate = emp.nat === "سعودي" ? 0.215 : 0.02;
                let companyGosi = Math.round((emp.basic + emp.saken) * gRate);
                let net = isClear ? emp.clearance : (isVac ? 0 : (emp.basic + emp.saken + emp.car + emp.mobile + emp.site + emp.residence + emp.otherFix - emp.gosiDeduct));
                kNet += net;
                
                block += `
                    <tr class="${isVac?'status-vacation':(isClear?'status-clearance':'')}">
                        <td>${eIdx+1}</td>
                        <td><select onchange="updateEmp(${kIdx},${eIdx},'status',this.value)" class="input-cell"><option value="دوام" ${emp.status==='دوام'?'selected':''}>دوام</option><option value="أجازة" ${emp.status==='أجازة'?'selected':''}>أجازة</option><option value="تصفية" ${emp.status==='تصفية'?'selected':''}>تصفية</option></select></td>
                        <td><input type="number" class="input-cell" value="${emp.clearance}" ${!isClear?'disabled':''} onchange="updateEmp(${kIdx},${eIdx},'clearance',this.value)"></td>
                        <td><input type="text" class="input-cell wide-cell" value="${emp.name}" onchange="updateEmp(${kIdx},${eIdx},'name',this.value)"></td>
                        <td><select onchange="updateEmp(${kIdx},${eIdx},'nat',this.value)" class="input-cell"><option value="مقيم" ${emp.nat==='مقيم'?'selected':''}>مقيم</option><option value="سعودي" ${emp.nat==='سعودي'?'selected':''}>سعودي</option></select></td>
                        <td><input type="number" class="input-cell" value="${emp.basic}" onchange="updateEmp(${kIdx},${eIdx},'basic',this.value)"></td>
                        <td><input type="number" class="input-cell" value="${emp.saken}" onchange="updateEmp(${kIdx},${eIdx},'saken',this.value)"></td>
                        <td><input type="number" class="input-cell" value="${emp.car}" onchange="updateEmp(${kIdx},${eIdx},'car',this.value)"></td>
                        <td><input type="number" class="input-cell" value="${emp.mobile}" onchange="updateEmp(${kIdx},${eIdx},'mobile',this.value)"></td>
                        <td><input type="number" class="input-cell" value="${emp.site}" onchange="updateEmp(${kIdx},${eIdx},'site',this.value)"></td>
                        <td><input type="number" class="input-cell" value="${emp.residence || 0}" onchange="updateEmp(${kIdx},${eIdx},'residence',this.value)"></td>
                        <td><input type="number" class="input-cell" value="${emp.otherFix}" onchange="updateEmp(${kIdx},${eIdx},'otherFix',this.value)"></td>
                        <td><input type="number" class="input-cell" value="${emp.gosiDeduct}" onchange="updateEmp(${kIdx},${eIdx},'gosiDeduct',this.value)"></td>
                        <td class="net-highlight">${net.toLocaleString()}</td>
                        <td class="gosi-cell">${companyGosi}</td>
                        <td><input type="text" class="input-cell bank-cell" value="${emp.bankName || ''}" onchange="updateEmp(${kIdx},${eIdx},'bankName',this.value)"></td>
                        <td><input type="text" class="input-cell wide-cell" value="${emp.bankIban || ''}" onchange="updateEmp(${kIdx},${eIdx},'bankIban',this.value)"></td>
                        <td><input type="text" class="input-cell wide-cell" value="${emp.notes}" onchange="updateEmp(${kIdx},${eIdx},'notes',this.value)"></td>
                    </tr>`;
            });
            block += `</tbody></table><div style="padding:10px; background:#f0fdf4; font-weight:bold;">إجمالي صافي الكفالة: ${kNet.toLocaleString()}</div></div>`;
            container.insertAdjacentHTML('beforeend', block);
        });
    }

    function saveData() {
        localStorage.setItem('saden_kofalat_db', JSON.stringify(allData));
        document.getElementById('saveToast').style.display = 'block';
        setTimeout(() => document.getElementById('saveToast').style.display = 'none', 2000);
    }

    function exportToExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.table_to_sheet(document.getElementById('kofalatContainer'));
        XLSX.utils.book_append_sheet(wb, ws, "الرواتب");
        XLSX.writeFile(wb, `رواتب_${currentBranch}.xlsx`);
    }

    initDashboard();
</script>
</body>
</html>
