<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سادن ERP | دليل الحسابات المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --navy: #0f172a; --blue: #2563eb; --emerald: #059669; 
            --rose: #e11d48; --amber: #d97706; --bg: #f8fafc; 
        }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        
        .container { max-width: 1100px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--navy); padding-bottom: 20px; margin-bottom: 25px; }
        
        /* تصميم الشجرة الشجرية */
        .coa-tree, .coa-tree ul { list-style: none; padding-right: 25px; margin: 0; }
        .coa-tree ul { display: none; border-right: 1px dashed #cbd5e1; }
        
        .node-row { 
            display: flex; align-items: center; gap: 12px; padding: 10px 15px; 
            border-bottom: 1px solid #f1f5f9; cursor: pointer; border-radius: 8px;
            transition: all 0.2s ease;
        }
        .node-row:hover { background: #f1f5f9; transform: translateX(-5px); }
        
        .plus-btn { 
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; 
            background: #e2e8f0; border-radius: 6px; font-weight: bold; font-size: 16px; color: var(--navy);
        }
        .plus-btn.active { background: var(--navy); color: white; }

        .acc-code { font-family: 'Courier New', monospace; background: #eff6ff; padding: 3px 8px; border-radius: 4px; color: var(--blue); font-weight: bold; min-width: 65px; text-align: center; }
        .acc-name { font-weight: 600; flex-grow: 1; font-size: 15px; }
        
        /* ألوان الفئات */
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: bold; color: white; }
        .cat-1 { background: var(--emerald); } /* أصول */
        .cat-2 { background: var(--rose); }    /* خصوم */
        .cat-3 { background: var(--navy); }    /* ملكية */
        .cat-4 { background: var(--blue); }    /* إيرادات */
        .cat-5 { background: var(--amber); }   /* مصروفات */
        .cat-9 { background: #64748b; }        /* ختامية */

        .btn-add { background: var(--navy); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0">دليل الحسابات الشامل | شركة سادن</h2>
            <p style="margin:5px 0 0; color: #64748b;">الهيكل المحاسبي المتكامل (أصول - خصوم - ملكية - إيرادات - مصروفات)</p>
        </div>
        <button class="btn-add">📥 تصدير الدليل (Excel)</button>
    </div>

    <div id="coaContainer" class="coa-tree">
        </div>
</div>

<script>
    // الدليل الكامل المدمج (سادن + حقوق الملكية)
    const sadenCOA = [
        // 1- الأصول (من صورتك)
        { id: 1, code: '1', name: 'الأصول', parent: 0, cat: 'cat-1' },
        { id: 11, code: '11', name: 'الأصول الثابتة', parent: 1, cat: 'cat-1' },
        { id: 11001, code: '11001', name: 'مباني', parent: 11, cat: 'cat-1' },
        { id: 11002, code: '11002', name: 'السيارات', parent: 11, cat: 'cat-1' },
        { id: 11007, code: '11007', name: 'آلات ومعدات الورش والحفر', parent: 11, cat: 'cat-1' },
        { id: 12, code: '12', name: 'الأموال الجاهزة', parent: 1, cat: 'cat-1' },
        { id: 12001, code: '12001', name: 'الصناديق', parent: 12, cat: 'cat-1' },
        { id: 12002, code: '12002', name: 'البنوك', parent: 12, cat: 'cat-1' },
        { id: 13, code: '13', name: 'عهد نقدية', parent: 1, cat: 'cat-1' },
        { id: 15, code: '15', name: 'ضريبة المشتريات (VAT Input)', parent: 1, cat: 'cat-1' },

        // 2- الخصوم (من صورتك)
        { id: 2, code: '2', name: 'الخصوم (الالتزامات)', parent: 0, cat: 'cat-2' },
        { id: 25, code: '25', name: 'ضريبة المبيعات (VAT Output)', parent: 2, cat: 'cat-2' },
        { id: 28, code: '28', name: 'الموردون ودائنون مختلفون', parent: 2, cat: 'cat-2' },
        { id: 29, code: '29', name: 'مصروفات مستحقة', parent: 2, cat: 'cat-2' },

        // 3- حقوق الملكية (الإضافة التصحيحية)
        { id: 3, code: '3', name: 'حقوق الملكية', parent: 0, cat: 'cat-3' },
        { id: 31, code: '31', name: 'رأس المال المدفوع', parent: 3, cat: 'cat-3' },
        { id: 32, code: '32', name: 'جاري المالك / الشركاء', parent: 3, cat: 'cat-3' },
        { id: 33, code: '33', name: 'أرباح مبقاة (مدورة)', parent: 3, cat: 'cat-3' },

        // 4- الإيرادات
        { id: 4, code: '4', name: 'الإيرادات', parent: 0, cat: 'cat-4' },
        { id: 41, code: '41', name: 'إيرادات مبيعات النشاط', parent: 4, cat: 'cat-4' },
        { id: 411, code: '411', name: 'إيرادات الفروع (جيزان/الرياض)', parent: 41, cat: 'cat-4' },

        // 5- المصروفات (تشمل تكاليف المشروعات)
        { id: 5, code: '5', name: 'المصروفات', parent: 0, cat: 'cat-5' },
        { id: 51, code: '51', name: 'تكلفة تشغيلية للمشروعات (مباشرة)', parent: 5, cat: 'cat-5' },
        { id: 52, code: '52', name: 'مصروفات عمومية وإدارية', parent: 5, cat: 'cat-5' },
        { id: 53, code: '53', name: 'رواتب وأجور الموظفين', parent: 5, cat: 'cat-5' },

        // 9- الحسابات الختامية
        { id: 9, code: '9', name: 'الحسابات الختامية', parent: 0, cat: 'cat-9' },
        { id: 91, code: '91', name: 'ملخص القائمة (أرباح وخسائر)', parent: 9, cat: 'cat-9' }
    ];

    function buildTree(parentId) {
        const children = sadenCOA.filter(item => item.parent === parentId);
        if (children.length === 0) return '';

        let html = '<ul>';
        children.forEach(acc => {
            const hasSub = sadenCOA.some(s => s.parent === acc.id);
            html += `
                <li>
                    <div class="node-row" onclick="toggleNode(this)">
                        ${hasSub ? '<span class="plus-btn">+</span>' : '<span style="width:24px"></span>'}
                        <span class="acc-code">${acc.code}</span>
                        <span class="acc-name">${acc.name}</span>
                        <span class="badge ${acc.cat}">${getCatName(acc.cat)}</span>
                    </div>
                    ${buildTree(acc.id)}
                </li>
            `;
        });
        html += '</ul>';
        return html;
    }

    function getCatName(cat) {
        const names = { 'cat-1': 'أصول', 'cat-2': 'خصوم', 'cat-3': 'ملكية', 'cat-4': 'إيراد', 'cat-5': 'مصروف', 'cat-9': 'ختامي' };
        return names[cat];
    }

    function toggleNode(el) {
        const sub = el.nextElementSibling;
        const btn = el.querySelector('.plus-btn');
        if (sub && sub.tagName === 'UL') {
            const isHidden = sub.style.display === 'none' || sub.style.display === '';
            sub.style.display = isHidden ? 'block' : 'none';
            if (btn) {
                btn.innerText = isHidden ? '-' : '+';
                btn.classList.toggle('active', isHidden);
            }
        }
    }

    // تشغيل البناء
    document.getElementById('coaContainer').innerHTML = buildTree(0).replace('<ul>', '<ul style="display:block; padding:0">');
</script>

</body>
</html>
