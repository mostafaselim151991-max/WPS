<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة حركة السيارات | مجموعة سادن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
    :root {
        /* ألوان أغمق بلمسة احترافية */
        --primary: #60a5fa; 
        --dark-header: #202124; /* لون خلفية التابات (كروم غامق) */
        --bg-content: #ffffff; 
        --tab-inactive: #35363a; 
        --tab-active: #ffffff; 
        --tab-hover: #3c4043;
        --border-line: #1c1d20;
    }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 0; }

    /* الهيدر العلوي */
    .top-header { background: white; padding: 10px 25px; border-bottom: 1px solid var(--border); }
    .top-header h1 { margin: 0; font-size: 18px; color: var(--dark); }
    .top-header .brand { color: var(--primary); font-weight: 700; }

    /* شريط التابات على طريقة كروم */
    .tabs-bar { 
        background: white; 
        padding: 8px 10px 0 10px; 
        display: flex; 
        align-items: flex-end; /* لضمان التصاق التاب بالأسفل */
        gap: 0; 
        border-bottom: 1px solid var(--border); 
        position: sticky; 
        top: 0; 
        z-index: 100;
        height: 45px;
    }

    .tab-btn { 
        position: relative;
        padding: 8px 30px; 
        border: none; 
        background: transparent; 
        font-family: inherit; 
        font-size: 13px; 
        font-weight: 600; 
        color: #5f6368; 
        cursor: pointer; 
        transition: 0.2s; 
        height: 34px;
        display: flex; 
        align-items: center; 
        gap: 8px;
        z-index: 1;
        border-radius: 10px 10px 0 0; /* زوايا علوية فقط */
    }

    /* تأثير الخلفية عند الحوم (Hover) */
    .tab-btn:hover:not(.active) { 
        background-color: var(--tab-hover); 
        color: #ffffff;
    }

    /* التاب النشط (Active Chrome Style) */
    .tab-btn.active { 
        background: var(--tab-active); 
        color: var(--primary); 
        box-shadow: 0 -1px 2px rgba(0,0,0,0.1);
        z-index: 2;
    }

    /* رسم الزوايا الدائرية السفلية (التريك بتاع كروم) */
    .tab-btn.active::before, .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        width: 16px;
        height: 16px;
        background: transparent;
        pointer-events: none;
    }
    .tab-btn.active::before {
        right: -16px;
        border-bottom-left-radius: 16px;
        box-shadow: -8px 0 0 0 var(--tab-active);
    }
    .tab-btn.active::after {
        left: -16px;
        border-bottom-right-radius: 16px;
        box-shadow: 8px 0 0 0 var(--tab-active);
    }

    /* منطقة المحتوى */
    .content-area { 
        background: white; /* المحتوى مكمل للتاب النشط */
        height: calc(100vh - 100px);
    }
    .tab-content { display: none; height: 100%; }
    .tab-content.active { display: block; }

    iframe { width: 100%; height: 100%; border: none; }

    .placeholder-card { padding: 100px; text-align: center; color: #94a3b8; }
    /* الحاوية الأساسية */
.dropdown {
    position: relative;
    display: inline-block;
}

/* القائمة المخفية */
.dropdown-content {
    display: none; /* مخفية افتراضياً */
    position: absolute;
    background-color: #ffffff;
    min-width: 220px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
    z-index: 9999;
    border-radius: 8px;
    top: 100%; /* تظهر مباشرة تحت الزرار */
    right: 0;
    border: 1px solid #e2e8f0;
    overflow: hidden;
    margin-top: -2px; /* لضمان عدم وجود فراغ يغلق القائمة عند تحريك الماوس */
}

/* روابط القائمة */
.dropdown-content a {
    color: #334155;
    padding: 12px 16px;
    text-decoration: none;
    display: block;
    font-size: 13px;
    font-weight: 600;
    border-bottom: 1px solid #f1f5f9;
    transition: 0.2s;
    text-align: right;
}

/* تأثير الوقوف على الخيارات */
.dropdown-content a:hover {
    background-color: #eff6ff;
    color: #3b82f6;
}

/* السحر هنا: عند الوقوف على حاوية الـ dropdown تظهر القائمة */
.dropdown:hover .dropdown-content {
    display: block;
    animation: fadeIn 0.2s ease-in;
}

/* تحسين شكل الزرار عند فتح القائمة */
.dropdown:hover .tab-btn {
    background-color: #f1f5f9;
    color: #3b82f6;
}

/* أنيميشن خفيف للظهور */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

    <div class="top-header">
        <h1>🚚 نظام إدارة حركة السيارات <span class="brand">| سادن الموحدة</span></h1>
    </div>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="openTab(event, 'tab-fleet')">📑 أسطول السيارات</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-add')">➕ تسجيل مركبة</button>
<div class="dropdown">
    <button class="tab-btn" id="maintenance-btn" onclick="openTab(event, 'tab-maintenance')">
        🛠️ صيانة السيارات ▼
    </button>
    <div class="dropdown-content">
        <a href="#" onclick="switchMaintenanceFrame('maintenance_request.html', event)">🆕 إنشاء طلب صيانة جديد</a>
        <a href="#" onclick="switchMaintenanceFrame('maintenance_record.html', event)">📜 سجل طلبات الصيانة</a>
    </div>
</div>        <button class="tab-btn" onclick="openTab(event, 'tab-delivery')">🤝 محاضر التسليم</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-accidents')">⚠️ سجل الحوادث</button>
    </div>

    <div class="content-area">
        <div id="tab-fleet" class="tab-content active">
            <iframe src="fleet_list.html" id="frame-fleet"></iframe>
        </div>

        <div id="tab-add" class="tab-content">
            <iframe src="add_car.html"></iframe>
        </div>

        <div id="tab-maintenance" class="tab-content">
  <iframe src="maintenance_request.html"></iframe>        </div>

        <div id="tab-delivery" class="tab-content">
            <div class="placeholder-card">
                <h2>🤝 قسم محاضر التسليم والتسلم</h2>
                <p>هذا القسم قيد البرمجة.. مخصص لتوثيق نقل عهدة المركبات.</p>
            </div>
        </div>

        <div id="tab-accidents" class="tab-content">
            <div class="placeholder-card">
                <h2 style="color: var(--danger);">⚠️ سجل الحوادث</h2>
                <p>هذا القسم قيد البرمجة.. مخصص لرصد وتوثيق الحوادث المرورية.</p>
            </div>
        </div>
    </div>

    <script>
        function openTab(evt, tabId) {
            let contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }

            let buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");

            // تحديث صفحة الأسطول تلقائياً عند الضغط عليها لرؤية الإضافات الجديدة
            if(tabId === 'tab-fleet') {
                document.getElementById('frame-fleet').src = document.getElementById('frame-fleet').src;
            }
        }
        function switchMaintenanceFrame(pageUrl, event) {
    event.preventDefault(); // منع القفز لأعلى الصفحة
    
    // تفعيل تاب الصيانة الرئيسي
    const maintBtn = document.getElementById('maintenance-btn');
    openTab({ currentTarget: maintBtn }, 'tab-maintenance');
    
    // تغيير الصفحة داخل الـ iframe
    const iframe = document.querySelector('#tab-maintenance iframe');
    if (iframe) {
        iframe.src = pageUrl;
    }
}
    </script>

</body>
</html>
