<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكاوى الموظفين - الشئون القانونية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            --border: #e2e8f0;
            --bg: #f8fafc;
        }
        
        body { font-family: 'Tajawal', Arial, sans-serif; background: var(--bg); color: var(--primary); }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .page-header { background: linear-gradient(135deg, var(--primary), var(--danger)); color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .page-header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .page-header p { opacity: 0.9; font-size: 1.1rem; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--border); }
        .tab-btn { background: none; border: none; padding: 12px 24px; font-size: 1rem; cursor: pointer; color: #64748b; border-bottom: 3px solid transparent; transition: all 0.3s; font-weight: 500; }
        .tab-btn:hover { color: var(--accent); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border-right: 5px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-card.new { border-right-color: var(--info); }
        .stat-card.processing { border-right-color: var(--warning); }
        .stat-card.resolved { border-right-color: var(--success); }
        
        .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 0.9rem; color: #64748b; margin-top: 5px; }
        
        .form-section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 500; margin-bottom: 8px; color: var(--primary); }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 0.95rem; }
        .form-group textarea { resize: vertical; min-height: 100px; grid-column: 1 / -1; }
        
        .form-actions { display: flex; gap: 10px; margin-top: 20px; grid-column: 1 / -1; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-secondary { background: var(--border); color: var(--primary); }
        .btn-secondary:hover { background: #cbd5e1; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        
        .cases-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cases-table thead { background: linear-gradient(135deg, var(--primary), var(--danger)); color: white; }
        .cases-table th { padding: 15px; text-align: right; font-weight: 600; }
        .cases-table td { padding: 15px; border-top: 1px solid var(--border); }
        .cases-table tbody tr:hover { background: #f0f9ff; }
        
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .status-new { background: #cffafe; color: #164e63; }
        .status-processing { background: #fef3c7; color: #92400e; }
        .status-resolved { background: #dcfce7; color: #166534; }
        
        .action-buttons { display: flex; gap: 8px; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .edit-btn { background: #dbeafe; color: #0284c7; }
        .edit-btn:hover { background: #bfdbfe; }
        .delete-btn { background: #fee2e2; color: #dc2626; }
        .delete-btn:hover { background: #fecaca; }
        .view-btn { background: #e0e7ff; color: #3730a3; }
        .view-btn:hover { background: #c7d2fe; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .modal-header { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .detail-row { display: grid; grid-template-columns: 150px 1fr; gap: 20px; margin-bottom: 15px; }
        .detail-label { font-weight: 600; color: var(--accent); }
        .detail-value { color: var(--primary); }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        
        .search-section { display: grid; grid-template-columns: 1fr 150px; gap: 15px; margin-bottom: 20px; }
        .search-input { padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; }
        .filter-select { padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; }
        
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group textarea { grid-column: 1; }
            .form-actions { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .cases-table { font-size: 0.9rem; }
            .cases-table th, .cases-table td { padding: 10px; }
            .action-buttons { flex-direction: column; }
            .page-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📢 شكاوى الموظفين</h1>
            <p>نظام تسجيل ومتابعة شكاوى الموظفين والعاملين بالشركة</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'dashboard-tab')">📊 لوحة التحكم</button>
            <button class="tab-btn" onclick="switchTab(event, 'complaints-tab')">📋 سجل الشكاوى</button>
            <button class="tab-btn" onclick="switchTab(event, 'add-tab')">➕ تسجيل شكوى جديدة</button>
        </div>

        <div id="dashboard-tab" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card new">
                    <div class="stat-value" id="new-count">0</div>
                    <div class="stat-label">🆕 شكاوى جديدة</div>
                </div>
                <div class="stat-card processing">
                    <div class="stat-value" id="processing-count">0</div>
                    <div class="stat-label">⏳ قيد المعالجة</div>
                </div>
                <div class="stat-card resolved">
                    <div class="stat-value" id="resolved-count">0</div>
                    <div class="stat-label">✅ مُحلولة</div>
                </div>
            </div>

            <div class="form-section">
                <h2 style="margin-bottom: 20px; color: var(--accent);">📈 ملخص إحصائي</h2>
                <div style="display: grid; gap: 15px;">
                    <div style="display: grid; grid-template-columns: auto 1fr; gap: 15px; align-items: center;">
                        <strong>إجمالي الشكاوى:</strong>
                        <div style="height: 30px; background: var(--border); border-radius: 8px; display: flex; align-items: center; padding: 0 15px; font-size: 1.1rem; font-weight: bold;" id="total-count">0</div>
                    </div>
                    <div style="display: grid; grid-template-columns: auto 1fr; gap: 15px; align-items: center;">
                        <strong>معدل الحل:</strong>
                        <div style="height: 30px; background: var(--border); border-radius: 8px; display: flex; align-items: center; padding: 0 15px; font-size: 1.1rem; font-weight: bold; color: var(--success);" id="resolution-rate">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="complaints-tab" class="tab-content">
            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن الموظف أو موضوع الشكوى..." onkeyup="filterComplaints()">
                <select id="statusFilter" class="filter-select" onchange="filterComplaints()">
                    <option value="">جميع الحالات</option>
                    <option value="جديدة">🆕 جديدة</option>
                    <option value="قيد المعالجة">⏳ قيد المعالجة</option>
                    <option value="مُحلولة">✅ مُحلولة</option>
                </select>
            </div>

            <table class="cases-table" id="complaintsTable">
                <thead>
                    <tr>
                        <th>رقم الشكوى</th>
                        <th>اسم الموظف</th>
                        <th>الموضوع</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="complaintsBody">
                    <tr><td colspan="6" class="empty-state">لا توجد شكاوى مسجلة</td></tr>
                </tbody>
            </table>
        </div>

        <div id="add-tab" class="tab-content">
            <div class="form-section">
                <h2 style="margin-bottom: 20px; color: var(--accent);">➕ تسجيل شكوى جديدة</h2>
                <form id="complaintForm" onsubmit="handleSaveComplaint(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>اسم الموظف</label>
                            <input type="text" id="empName" placeholder="اسم الموظف المشتكي" required>
                        </div>
                        <div class="form-group">
                            <label>رقم الموظف</label>
                            <input type="text" id="empNumber" placeholder="رقم الموظف">
                        </div>
                        <div class="form-group">
                            <label>الإدارة</label>
                            <input type="text" id="department" placeholder="الإدارة أو القسم">
                        </div>
                        <div class="form-group">
                            <label>موضوع الشكوى</label>
                            <input type="text" id="subject" placeholder="موضوع الشكوى" required>
                        </div>
                        <div class="form-group">
                            <label>تاريخ الشكوى</label>
                            <input type="date" id="complaintDate" required>
                        </div>
                        <div class="form-group">
                            <label>درجة الأهمية</label>
                            <select id="priority" required>
                                <option value="عالية">🔴 عالية</option>
                                <option value="متوسطة">🟡 متوسطة</option>
                                <option value="منخفضة">🟢 منخفضة</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>الحالة</label>
                            <select id="status" required>
                                <option value="جديدة">🆕 جديدة</option>
                                <option value="قيد المعالجة">⏳ قيد المعالجة</option>
                                <option value="مُحلولة">✅ مُحلولة</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>تفاصيل الشكوى</label>
                            <textarea id="details" placeholder="اشرح تفاصيل الشكوى كاملة" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>الإجراء المتخذ</label>
                            <textarea id="action" placeholder="الإجراء الذي تم اتخاذه أو سيتم اتخاذه"></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-success">💾 حفظ الشكوى</button>
                            <button type="reset" class="btn btn-secondary">🔄 مسح البيانات</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">تفاصيل الشكوى</div>
            <div id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        let complaints = JSON.parse(localStorage.getItem('saden_complaints')) || [];

        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function handleSaveComplaint(event) {
            event.preventDefault();
            
            const newComplaint = {
                id: Date.now(),
                complaintNumber: 'SH-' + Date.now().toString().slice(-6),
                empName: document.getElementById('empName').value,
                empNumber: document.getElementById('empNumber').value,
                department: document.getElementById('department').value,
                subject: document.getElementById('subject').value,
                complaintDate: document.getElementById('complaintDate').value,
                priority: document.getElementById('priority').value,
                status: document.getElementById('status').value,
                details: document.getElementById('details').value,
                action: document.getElementById('action').value,
                createdAt: new Date().toISOString()
            };

            complaints.push(newComplaint);
            saveToLocalStorage();
            document.getElementById('complaintForm').reset();
            alert('✅ تم حفظ الشكوى بنجاح');
            switchTab({ target: document.querySelector('[onclick*="complaints-tab"]') }, 'complaints-tab');
            renderComplaints();
        }

        function renderComplaints() {
            const tbody = document.getElementById('complaintsBody');
            
            if (complaints.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">لا توجد شكاوى مسجلة</td></tr>';
                return;
            }

            tbody.innerHTML = complaints.map(c => `
                <tr>
                    <td><strong>${c.complaintNumber}</strong></td>
                    <td>${c.empName}</td>
                    <td>${c.subject}</td>
                    <td>${new Date(c.complaintDate).toLocaleDateString('ar-SA')}</td>
                    <td><span class="status-badge status-${getStatusClass(c.status)}">${c.status}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn view-btn" onclick="viewDetails(${c.id})">👁️ عرض</button>
                            <button class="action-btn edit-btn" onclick="editComplaint(${c.id})">✏️ تعديل</button>
                            <button class="action-btn delete-btn" onclick="deleteComplaint(${c.id})">🗑️ حذف</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            updateStats();
        }

        function updateStats() {
            const newCount = complaints.filter(c => c.status === 'جديدة').length;
            const processingCount = complaints.filter(c => c.status === 'قيد المعالجة').length;
            const resolvedCount = complaints.filter(c => c.status === 'مُحلولة').length;
            const total = complaints.length;
            const resolutionRate = total > 0 ? Math.round((resolvedCount / total) * 100) : 0;

            document.getElementById('new-count').innerText = newCount;
            document.getElementById('processing-count').innerText = processingCount;
            document.getElementById('resolved-count').innerText = resolvedCount;
            document.getElementById('total-count').innerText = total;
            document.getElementById('resolution-rate').innerText = resolutionRate + '%';
        }

        function viewDetails(complaintId) {
            const complaint = complaints.find(c => c.id === complaintId);
            if (!complaint) return;

            const modal = document.getElementById('detailsModal');
            const body = document.getElementById('modalBody');

            body.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">رقم الشكوى:</div>
                    <div class="detail-value">${complaint.complaintNumber}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">اسم الموظف:</div>
                    <div class="detail-value">${complaint.empName}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">الإدارة:</div>
                    <div class="detail-value">${complaint.department || '-'}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">الموضوع:</div>
                    <div class="detail-value">${complaint.subject}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">درجة الأهمية:</div>
                    <div class="detail-value">${complaint.priority}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">الحالة:</div>
                    <div class="detail-value"><span class="status-badge status-${getStatusClass(complaint.status)}">${complaint.status}</span></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">التاريخ:</div>
                    <div class="detail-value">${new Date(complaint.complaintDate).toLocaleDateString('ar-SA')}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">التفاصيل:</div>
                    <div class="detail-value" style="white-space: pre-wrap;">${complaint.details}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">الإجراء المتخذ:</div>
                    <div class="detail-value" style="white-space: pre-wrap;">${complaint.action || '-'}</div>
                </div>
            `;

            modal.classList.add('active');
        }

        function editComplaint(complaintId) {
            const complaint = complaints.find(c => c.id === complaintId);
            if (!complaint) return;

            document.getElementById('empName').value = complaint.empName;
            document.getElementById('empNumber').value = complaint.empNumber;
            document.getElementById('department').value = complaint.department;
            document.getElementById('subject').value = complaint.subject;
            document.getElementById('complaintDate').value = complaint.complaintDate;
            document.getElementById('priority').value = complaint.priority;
            document.getElementById('status').value = complaint.status;
            document.getElementById('details').value = complaint.details;
            document.getElementById('action').value = complaint.action;

            document.getElementById('complaintForm').dataset.editId = complaintId;
            
            switchTab({ target: document.querySelector('[onclick*="add-tab"]') }, 'add-tab');
            window.scrollTo(0, 0);
        }

        function deleteComplaint(complaintId) {
            const complaint = complaints.find(c => c.id === complaintId);
            if (!complaint) return;

            if (confirm(`⚠️ هل أنت متأكد من حذف الشكوى: ${complaint.complaintNumber}؟`)) {
                complaints = complaints.filter(c => c.id !== complaintId);
                saveToLocalStorage();
                renderComplaints();
                alert('✅ تم حذف الشكوى بنجاح');
            }
        }

        function filterComplaints() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            const tbody = document.getElementById('complaintsBody');
            const filtered = complaints.filter(c => {
                const matchesSearch = c.empName.toLowerCase().includes(searchTerm) || c.subject.toLowerCase().includes(searchTerm);
                const matchesStatus = !statusFilter || c.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">لا توجد نتائج مطابقة</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td><strong>${c.complaintNumber}</strong></td>
                    <td>${c.empName}</td>
                    <td>${c.subject}</td>
                    <td>${new Date(c.complaintDate).toLocaleDateString('ar-SA')}</td>
                    <td><span class="status-badge status-${getStatusClass(c.status)}">${c.status}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn view-btn" onclick="viewDetails(${c.id})">👁️ عرض</button>
                            <button class="action-btn edit-btn" onclick="editComplaint(${c.id})">✏️ تعديل</button>
                            <button class="action-btn delete-btn" onclick="deleteComplaint(${c.id})">🗑️ حذف</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusClass(status) {
            switch(status) {
                case 'جديدة': return 'new';
                case 'قيد المعالجة': return 'processing';
                case 'مُحلولة': return 'resolved';
                default: return 'new';
            }
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        function saveToLocalStorage() {
            localStorage.setItem('saden_complaints', JSON.stringify(complaints));
        }

        document.getElementById('complaintForm').addEventListener('submit', function(e) {
            const editId = this.dataset.editId;
            if (editId) {
                e.preventDefault();
                const index = complaints.findIndex(c => c.id === parseInt(editId));
                if (index !== -1) {
                    complaints[index] = {
                        ...complaints[index],
                        empName: document.getElementById('empName').value,
                        empNumber: document.getElementById('empNumber').value,
                        department: document.getElementById('department').value,
                        subject: document.getElementById('subject').value,
                        complaintDate: document.getElementById('complaintDate').value,
                        priority: document.getElementById('priority').value,
                        status: document.getElementById('status').value,
                        details: document.getElementById('details').value,
                        action: document.getElementById('action').value
                    };
                    saveToLocalStorage();
                    alert('✅ تم تحديث الشكوى بنجاح');
                    this.dataset.editId = '';
                    this.reset();
                    renderComplaints();
                    switchTab({ target: document.querySelector('[onclick*="complaints-tab"]') }, 'complaints-tab');
                }
            }
        });

        window.addEventListener('load', () => {
            renderComplaints();
        });

        document.getElementById('detailsModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailsModal') closeModal();
        });
    </script>
</body>
</html>
