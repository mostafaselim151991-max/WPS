<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكاوى الموظفين - سادن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #d32f2f;
            --accent-light: rgba(211, 47, 47, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #f4f7f6;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-muted: #64748b;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .page-header {
            background: var(--primary);
            color: white;
            padding: 20px 25px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 { margin: 0; font-size: 1.4rem; }
        .page-header p { margin: 4px 0 0; opacity: 0.7; font-size: 0.9rem; }

        .badge-count {
            background: var(--accent);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
        }

        .toolbar {
            background: var(--white);
            padding: 15px 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .toolbar input, .toolbar select {
            padding: 9px 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Tajawal';
            font-size: 14px;
            background: var(--bg);
        }

        .toolbar input { flex: 1; min-width: 200px; }

        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Tajawal';
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--border); }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--white);
            padding: 18px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-top: 4px solid var(--accent);
        }

        .stat-box.green { border-top-color: var(--success); }
        .stat-box.orange { border-top-color: var(--warning); }
        .stat-box.blue { border-top-color: var(--info); }

        .stat-box .num { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-box .lbl { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        .table-wrap {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            overflow: hidden;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: var(--primary); color: white; }
        thead th { padding: 14px 12px; font-size: 13px; white-space: nowrap; }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.2s; }
        tbody tr:hover { background: var(--accent-light); }
        tbody td { padding: 12px; font-size: 14px; }

        .status-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-new { background: #fef3c7; color: #92400e; }
        .status-open { background: #dbeafe; color: #1e40af; }
        .status-closed { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }

        .action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            font-family: 'Tajawal';
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .action-view { background: #e0f2fe; color: #0369a1; }
        .action-edit { background: #fef3c7; color: #92400e; }
        .action-close { background: #d1fae5; color: #065f46; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 700px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .modal h3 {
            margin: 0 0 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
            color: var(--primary);
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-grid .full { grid-column: 1 / -1; }

        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-group label { font-size: 13px; font-weight: bold; color: var(--accent); }

        .field-group input,
        .field-group select,
        .field-group textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Tajawal';
            font-size: 14px;
            background: var(--bg);
        }

        .field-group textarea { resize: vertical; min-height: 90px; }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

        .detail-section { background: var(--bg); border-radius: 10px; padding: 15px; margin-top: 15px; }
        .detail-row { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-muted); min-width: 160px; font-weight: bold; }

        @media print {
            .toolbar, .modal-overlay { display: none !important; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <div>
        <h2>⚖️ شكاوى الموظفين</h2>
        <p>الشئون القانونية - شركة سادن للاستشارات الجيولوجية</p>
    </div>
    <span class="badge-count" id="totalBadge">0 شكوى</span>
</div>

<div class="stats-row">
    <div class="stat-box">
        <div class="num" id="statTotal">0</div>
        <div class="lbl">إجمالي الشكاوى</div>
    </div>
    <div class="stat-box orange">
        <div class="num" id="statNew">0</div>
        <div class="lbl">شكاوى جديدة</div>
    </div>
    <div class="stat-box blue">
        <div class="num" id="statOpen">0</div>
        <div class="lbl">قيد المعالجة</div>
    </div>
    <div class="stat-box green">
        <div class="num" id="statClosed">0</div>
        <div class="lbl">مغلقة / منتهية</div>
    </div>
</div>

<div class="toolbar">
    <input type="text" id="searchInput" placeholder="ابحث باسم الموظف أو رقمه أو الفرع..." oninput="renderTable()">
    <select id="filterStatus" onchange="renderTable()">
        <option value="">كل الحالات</option>
        <option value="جديدة">جديدة</option>
        <option value="قيد المعالجة">قيد المعالجة</option>
        <option value="مغلقة">مغلقة</option>
        <option value="مرفوضة">مرفوضة</option>
    </select>
    <select id="filterBranch" onchange="renderTable()">
        <option value="">كل الفروع</option>
        <option value="الرياض">الرياض</option>
        <option value="جدة">جدة</option>
        <option value="الدمام">الدمام</option>
    </select>
    <button class="btn btn-primary" onclick="openAddModal()">+ تسجيل شكوى جديدة</button>
    <button class="btn btn-outline" onclick="window.print()">طباعة 📥</button>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>رقم الشكوى</th>
                <th>اسم الموظف</th>
                <th>الرقم الوظيفي</th>
                <th>الفرع</th>
                <th>نوع الشكوى</th>
                <th>ضد</th>
                <th>تاريخ التقديم</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<!-- Modal الإضافة/التعديل -->
<div class="modal-overlay" id="formModal">
    <div class="modal">
        <h3 id="modalTitle">تسجيل شكوى جديدة</h3>
        <div class="form-grid">
            <div class="field-group full">
                <label>اختر الموظف من السجل</label>
                <select id="f_empSelect" onchange="fillEmployeeData('complaints')">
                    <option value="">-- اختر موظفاً --</option>
                </select>
            </div>
            <div class="field-group">
                <label>اسم الموظف مقدم الشكوى</label>
                <input type="text" id="f_name" placeholder="الاسم الكامل">
            </div>
            <div class="field-group">
                <label>الرقم الوظيفي</label>
                <input type="text" id="f_empId" placeholder="SAD-XXX">
            </div>
            <div class="field-group">
                <label>الفرع</label>
                <input type="text" id="f_branch" placeholder="الفرع">
            </div>
            <div class="field-group">
                <label>الجهة / الشخص المُشتكى عليه</label>
                <input type="text" id="f_against" placeholder="اسم الشخص أو الجهة">
            </div>
            <div class="field-group">
                <label>نوع الشكوى</label>
                <select id="f_type">
                    <option value="">-- اختر --</option>
                    <option>تحرش أو مضايقة</option>
                    <option>ظلم وظيفي</option>
                    <option>عدم صرف المستحقات</option>
                    <option>خصم غير مبرر</option>
                    <option>بيئة عمل غير آمنة</option>
                    <option>تمييز وظيفي</option>
                    <option>أخرى</option>
                </select>
            </div>
            <div class="field-group">
                <label>تاريخ التقديم</label>
                <input type="date" id="f_date">
            </div>
            <div class="field-group">
                <label>الحالة</label>
                <select id="f_status">
                    <option>جديدة</option>
                    <option>قيد المعالجة</option>
                    <option>مغلقة</option>
                    <option>مرفوضة</option>
                </select>
            </div>
            <div class="field-group">
                <label>المسئول عن المعالجة</label>
                <input type="text" id="f_handler" placeholder="اسم المسئول القانوني">
            </div>
            <div class="field-group full">
                <label>تفاصيل الشكوى</label>
                <textarea id="f_details" placeholder="اكتب تفاصيل الشكوى هنا..."></textarea>
            </div>
            <div class="field-group full">
                <label>ملاحظات / قرار</label>
                <textarea id="f_notes" placeholder="ملاحظات أو القرار النهائي..."></textarea>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="saveComplaint()">حفظ</button>
            <button class="btn btn-outline" onclick="closeModal('formModal')">إلغاء</button>
        </div>
    </div>
</div>

<!-- Modal التفاصيل -->
<div class="modal-overlay" id="viewModal">
    <div class="modal">
        <h3>تفاصيل الشكوى</h3>
        <div id="viewContent"></div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal('viewModal')">إغلاق</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'saden_complaints';

    let complaints = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        { id: "CMP-001", name: "أحمد منصور", empId: "SAD-102", branch: "الرياض", type: "خصم غير مبرر", against: "المدير المالي", date: "2026-03-10", status: "قيد المعالجة", handler: "المستشار القانوني", details: "تم خصم مبلغ من الراتب دون إشعار مسبق أو توضيح السبب.", notes: "جاري التحقق من كشف الراتب." },
        { id: "CMP-002", name: "محمد سليم", empId: "SAD-201", branch: "جدة", type: "ظلم وظيفي", against: "مدير الفرع", date: "2026-04-01", status: "جديدة", handler: "", details: "تم تجاوزه في الترقية رغم استيفاء جميع الشروط.", notes: "" },
        { id: "CMP-003", name: "فهد خالد", empId: "SAD-301", branch: "الدمام", type: "بيئة عمل غير آمنة", against: "إدارة الموقع", date: "2026-02-20", status: "مغلقة", handler: "فريق السلامة", details: "غياب معدات الحماية الشخصية في الموقع.", notes: "تم توفير المعدات وإغلاق الشكوى." }
    ];

    let editIndex = -1;

    function loadEmployeesSelect(selectId) {
        const employees = JSON.parse(localStorage.getItem('saden_employees') || '[]');
        const select = document.getElementById(selectId);
        const firstOpt = select.querySelector('option:first-child');
        select.innerHTML = '';
        select.appendChild(firstOpt.cloneNode(true));
        employees.forEach(emp => {
            const opt = document.createElement('option');
            opt.value = emp.emp_number;
            opt.textContent = `${emp.emp_name} (${emp.emp_number})`;
            opt.dataset.name = emp.emp_name;
            opt.dataset.empId = emp.emp_number;
            opt.dataset.branch = emp.dept || '';
            opt.dataset.title = emp.company_job || '';
            select.appendChild(opt);
        });
    }

    function fillEmployeeData(context) {
        const select = document.getElementById('f_empSelect');
        const selected = select.options[select.selectedIndex];
        if (!selected || !selected.value) return;
        document.getElementById('f_name').value = selected.dataset.name || '';
        document.getElementById('f_empId').value = selected.dataset.empId || '';
        document.getElementById('f_branch').value = selected.dataset.branch || '';
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(complaints));
    }

    function getStatusClass(status) {
        const map = { 'جديدة': 'status-new', 'قيد المعالجة': 'status-open', 'مغلقة': 'status-closed', 'مرفوضة': 'status-rejected' };
        return map[status] || 'status-new';
    }

    function updateStats() {
        const total = complaints.length;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statNew').textContent = complaints.filter(c => c.status === 'جديدة').length;
        document.getElementById('statOpen').textContent = complaints.filter(c => c.status === 'قيد المعالجة').length;
        document.getElementById('statClosed').textContent = complaints.filter(c => c.status === 'مغلقة').length;
        document.getElementById('totalBadge').textContent = total + ' شكوى';
    }

    function renderTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('filterStatus').value;
        const branch = document.getElementById('filterBranch').value;

        const filtered = complaints.filter(c => {
            const matchSearch = !search || c.name.toLowerCase().includes(search) || c.empId.toLowerCase().includes(search) || c.branch.includes(search);
            const matchStatus = !status || c.status === status;
            const matchBranch = !branch || c.branch === branch;
            return matchSearch && matchStatus && matchBranch;
        });

        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:30px; color:#64748b;">لا توجد بيانات</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map((c, i) => `
            <tr>
                <td>${i + 1}</td>
                <td><strong>${c.id}</strong></td>
                <td>${c.name}</td>
                <td>${c.empId}</td>
                <td>${c.branch}</td>
                <td>${c.type}</td>
                <td>${c.against}</td>
                <td>${c.date}</td>
                <td><span class="status-badge ${getStatusClass(c.status)}">${c.status}</span></td>
                <td>
                    <div class="action-btns">
                        <button class="action-btn action-view" onclick="viewComplaint('${c.id}')">عرض</button>
                        <button class="action-btn action-edit" onclick="editComplaint('${c.id}')">تعديل</button>
                        <button class="action-btn" style="background:#fee2e2;color:#991b1b;" onclick="deleteComplaint('${c.id}')">حذف</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function openAddModal() {
        editIndex = -1;
        document.getElementById('modalTitle').textContent = 'تسجيل شكوى جديدة';
        ['f_name','f_empId','f_branch','f_against','f_handler','f_details','f_notes'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f_empSelect').value = '';
        document.getElementById('f_type').value = '';
        document.getElementById('f_status').value = 'جديدة';
        document.getElementById('f_date').value = new Date().toISOString().split('T')[0];
        loadEmployeesSelect('f_empSelect');
        document.getElementById('formModal').classList.add('active');
    }

    function editComplaint(id) {
        const idx = complaints.findIndex(c => c.id === id);
        if (idx === -1) return;
        const c = complaints[idx];
        editIndex = idx;
        document.getElementById('modalTitle').textContent = 'تعديل الشكوى: ' + c.id;
        loadEmployeesSelect('f_empSelect');
        document.getElementById('f_empSelect').value = '';
        document.getElementById('f_name').value = c.name;
        document.getElementById('f_empId').value = c.empId;
        document.getElementById('f_branch').value = c.branch;
        document.getElementById('f_against').value = c.against;
        document.getElementById('f_type').value = c.type;
        document.getElementById('f_date').value = c.date;
        document.getElementById('f_status').value = c.status;
        document.getElementById('f_handler').value = c.handler;
        document.getElementById('f_details').value = c.details;
        document.getElementById('f_notes').value = c.notes;
        document.getElementById('formModal').classList.add('active');
    }

    function saveComplaint() {
        const name = document.getElementById('f_name').value.trim();
        const empId = document.getElementById('f_empId').value.trim();
        const branch = document.getElementById('f_branch').value.trim();
        const type = document.getElementById('f_type').value;

        if (!name || !empId || !branch || !type) {
            alert('يرجى تعبئة الحقول الأساسية: الاسم، الرقم الوظيفي، الفرع، نوع الشكوى');
            return;
        }

        const entry = {
            id: editIndex === -1 ? 'CMP-' + String(complaints.length + 1).padStart(3, '0') : complaints[editIndex].id,
            name,
            empId,
            branch,
            against: document.getElementById('f_against').value.trim(),
            type,
            date: document.getElementById('f_date').value,
            status: document.getElementById('f_status').value,
            handler: document.getElementById('f_handler').value.trim(),
            details: document.getElementById('f_details').value.trim(),
            notes: document.getElementById('f_notes').value.trim()
        };

        if (editIndex === -1) {
            complaints.push(entry);
        } else {
            complaints[editIndex] = entry;
        }

        save();
        renderTable();
        updateStats();
        closeModal('formModal');
    }

    function viewComplaint(id) {
        const c = complaints.find(x => x.id === id);
        if (!c) return;
        document.getElementById('viewContent').innerHTML = `
            <div class="detail-section">
                <div class="detail-row"><span class="detail-label">رقم الشكوى:</span><span>${c.id}</span></div>
                <div class="detail-row"><span class="detail-label">اسم الموظف:</span><span>${c.name}</span></div>
                <div class="detail-row"><span class="detail-label">الرقم الوظيفي:</span><span>${c.empId}</span></div>
                <div class="detail-row"><span class="detail-label">الفرع:</span><span>${c.branch}</span></div>
                <div class="detail-row"><span class="detail-label">المُشتكى عليه:</span><span>${c.against}</span></div>
                <div class="detail-row"><span class="detail-label">نوع الشكوى:</span><span>${c.type}</span></div>
                <div class="detail-row"><span class="detail-label">تاريخ التقديم:</span><span>${c.date}</span></div>
                <div class="detail-row"><span class="detail-label">الحالة:</span><span class="status-badge ${getStatusClass(c.status)}">${c.status}</span></div>
                <div class="detail-row"><span class="detail-label">المسئول عن المعالجة:</span><span>${c.handler || 'لم يُحدد'}</span></div>
                <div class="detail-row"><span class="detail-label">تفاصيل الشكوى:</span><span>${c.details || '-'}</span></div>
                <div class="detail-row"><span class="detail-label">ملاحظات / قرار:</span><span>${c.notes || '-'}</span></div>
            </div>
        `;
        document.getElementById('viewModal').classList.add('active');
    }

    function deleteComplaint(id) {
        if (!confirm('هل أنت متأكد من حذف هذه الشكوى؟')) return;
        complaints = complaints.filter(c => c.id !== id);
        save();
        renderTable();
        updateStats();
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    renderTable();
    updateStats();
</script>
</body>
</html>
