<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل مركبة | مجموعة سادن الموحدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --dark: #0f172a; --bg: #f8fafc; --gold: #fef3c7; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); padding: 20px; }
        .form-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 1200px; margin: 0 auto; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .section-head { grid-column: span 4; background: var(--dark); color: white; padding: 10px 20px; border-radius: 8px; margin: 20px 0 10px 0; font-size: 15px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: 700; color: #475569; }
        input, select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .btn-save { grid-column: span 4; background: var(--primary); color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 16px; margin-top: 20px; }
        .btn-save:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="text-align: center; margin-bottom: 30px; color: var(--dark);">📋 نموذج تسجيل مركبة - نظام سادن الموحد</h2>
    
    <div class="grid-container">
        <div class="section-head">البيانات الفنية والتعريفية</div>
        <div class="field"><label>الماركة</label><input type="text" id="brand" placeholder="مثلاً: تويوتا"></div>
        <div class="field"><label>الطراز</label><input type="text" id="model_type" placeholder="مثلاً: هايلوكس"></div>
        <div class="field"><label>سنة الصنع</label><input type="number" id="year" value="2026"></div>
        <div class="field"><label>اللون الأساسي</label><input type="text" id="color"></div>
        <div class="field"><label>رقم اللوحة</label><input type="text" id="plate"></div>
        <div class="field"><label>نوع الوقود</label>
            <select id="fuel"><option>ديزل</option><option>بنزين</option></select>
        </div>
        <div class="field"><label>السجل</label><input type="text" id="record_no"></div>
        <div class="field"><label>الفرع المستخدم</label><input type="text" id="branch"></div>

        <div class="section-head">المستندات والتواريخ القانونية</div>
        <div class="field"><label>تاريخ انتهاء رخصة السير</label><input type="date" id="registration_end"></div>
        <div class="field"><label>تاريخ انتهاء الفحص</label><input type="date" id="test_end"></div>
        <div class="field"><label>تاريخ التأمين</label><input type="date" id="insurance_date"></div>
        <div class="field"><label>نهاية كرت التشغيل</label><input type="date" id="op_card_end"></div>
        
        <div class="section-head">بيانات العهدة والمتابعة الميدانية</div>
        <div class="field"><label>اسم المستخدم الفعلي (السائق)</label><input type="text" id="driver"></div>
        <div class="field"><label>كارت المتابعة</label><input type="text" id="follow_card" placeholder="رقم الكارت"></div>
        <div class="field" style="grid-column: span 2;"><label>محضر تسليم</label><input type="text" id="delivery_report" placeholder="رقم أو مرجع المحضر"></div>

        <button class="btn-save" onclick="saveToFleet()">حفظ المركبة في قاعدة البيانات المركزية</button>
    </div>
</div>

<script>
    function saveToFleet() {
        const vehicle = {
            id: Date.now(),
            brand: document.getElementById('brand').value,
            model: document.getElementById('model_type').value,
            year: document.getElementById('year').value,
            color: document.getElementById('color').value,
            plate: document.getElementById('plate').value,
            fuel: document.getElementById('fuel').value,
            record: document.getElementById('record_no').value,
            branch: document.getElementById('branch').value,
            reg_end: document.getElementById('registration_end').value,
            test_end: document.getElementById('test_end').value,
            ins_date: document.getElementById('insurance_date').value,
            op_end: document.getElementById('op_card_end').value,
            driver: document.getElementById('driver').value,
            follow_card: document.getElementById('follow_card').value,
            delivery: document.getElementById('delivery_report').value
        };

        if(!vehicle.plate || !vehicle.brand) return alert("يرجى إدخال الماركة ورقم اللوحة");

        let fleet = JSON.parse(localStorage.getItem('saden_fleet_db')) || [];
        fleet.push(vehicle);
        localStorage.setItem('saden_fleet_db', JSON.stringify(fleet));

        alert("تم الحفظ بنجاح. سيتم توجيهك لجدول الأسطول.");
        window.location.href = 'fleet_list.html';
    }
</script>

</body>
</html>
